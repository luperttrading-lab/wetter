    {n:"Argentinien",c:"ARG",p:1877.27,f:"🇦🇷",tf:0.0892},{n:"Kap Verde",c:"CPV",p:1350.00,f:"🇨🇻",tf:null},
    {n:"Australien",c:"AUS",p:1579.34,f:"🇦🇺",tf:-0.0277}, {n:"Ägypten",c:"EGY",p:1562.37,f:"🇪🇬",tf:null},
    {n:"Schweiz",c:"SUI",p:1650.06,f:"🇨🇭",tf:0.0478},    {n:"Algerien",c:"ALG",p:1571.03,f:"🇩🇿",tf:null},
    {n:"Portugal",c:"POR",p:1767.85,f:"🇵🇹",tf:-0.0467},   {n:"Kroatien",c:"CRO",p:1714.87,f:"🇭🇷",tf:0.1124},
  ];
  const NT = TEAMS.length; // 32

  // ===== Bedingte Prognose: K.o.-Stand aus dem Bracket (gleicher Origin, geteilter localStorage) =====
  const KO_STORE_KEY = "wm2026-bracket-2";
  const KO_COUNTS = [16,8,4,2,1];
  const RABBR = ["SF","AF","VF","HF","F"];   // Sechzehntel-/Achtel-/Viertel-/Halbfinale, Finale

  function readBracket(){
    try{
      const raw = localStorage.getItem(KO_STORE_KEY);
      if(!raw) return null;
      const d = JSON.parse(raw);
      if(!d || !Array.isArray(d.winner) || !Array.isArray(d.official)) return null;
      return {winner:d.winner, official:d.official};
    }catch(e){ return null; }
  }
  // fixedWin[r][m] = Team-Index des Siegers, wenn das Spiel ECHT entschieden ist (official + Sieger gesetzt), sonst null.
  // Slot-Logik identisch zu runMany: Sieger von Spiel m landet auf Slot m der nächsten Runde.
  function buildFixed(bk){
    if(!bk) return null;
    const fw = KO_COUNTS.map(c=>new Array(c).fill(null));
    const dec=(r,m)=>{ const off=bk.official[r]&&bk.official[r][m]; const w=bk.winner[r]&&bk.winner[r][m];
      return off && (w===0||w===1) ? w : null; };
    for(let m=0;m<KO_COUNTS[0];m++){ const w=dec(0,m); if(w!==null) fw[0][m]=2*m+w; }
    for(let r=1;r<5;r++) for(let m=0;m<KO_COUNTS[r];m++){
      const a=fw[r-1][2*m], b=fw[r-1][2*m+1], w=dec(r,m);
      if(a!=null && b!=null && w!==null) fw[r][m] = w===0?a:b;
    }
    return fw;
  }
  // Fortschritt eines Teams entlang seines Pfades: {reached:0..5, status:'active'|'out'|'champion'}
  function teamProgress(p, fw){
    if(!fw) return {reached:0, status:'active'};
    let slot=p;
    for(let r=0;r<5;r++){
      const win = fw[r][slot>>1];
      if(win==null) return {reached:r, status:'active'};   // Runde r erreicht, dort noch im Rennen / wartend
      if(win===p) slot = slot>>1;                          // gewonnen -> eine Runde weiter
      else return {reached:r, status:'out'};               // in Runde r ausgeschieden
    }
    return {reached:5, status:'champion'};
  }

  // Namensanzeige: 'full' = voller Name, 'code' = FIFA-3-Buchstaben-Kürzel
  let nameMode = 'full';
  const modeByTab = {prob:'full', single:'code'};
  let activeNameTab = 'prob';
  const teamLabel = t => nameMode === 'code' ? t.c : t.n;
  let SCORES_IN_NAME_MODE = false;  // Tore nur im Kürzel-Modus (Namen sonst zu kurz)
  const scoresVisible = () => nameMode==='code' || SCORES_IN_NAME_MODE;
  // Cache der letzten Ergebnisse (Umschalten soll NICHT neu simulieren/würfeln)
  let lastSim = null, lastProb = null;

  // Parameter-State
  let DIV = 600, HOME_ON = false, HOME_BONUS = 75, NRUN = 100000;
  let TF_ON = false, TF_STR = 1.0;
  const TF_K = 4/LN10;   // Turnierfaktor -> Elo-Bonus, divisor-konsistent

  function effPts(){
    const p = new Float64Array(NT);
    const k = TF_ON ? DIV*TF_K*TF_STR : 0;
    for(let i=0;i<NT;i++){
      let v = TEAMS[i].p + (HOME_ON && TEAMS[i].host ? HOME_BONUS : 0);
      if(TF_ON && TEAMS[i].tf!=null) v += TEAMS[i].tf * k;
      p[i] = v;
    }
    return p;
  }

  // ---- Aggregat: N Turniere, Wahrscheinlichkeiten pro Runde ----
  function runMany(N, fixedWin){
    const pts = effPts();
    const af=new Float64Array(NT), vf=new Float64Array(NT),
          hf=new Float64Array(NT), fin=new Float64Array(NT), tit=new Float64Array(NT);
    const cur=new Int32Array(NT), nxt=new Int32Array(NT);
    for(let s=0;s<N;s++){
      for(let i=0;i<NT;i++) cur[i]=i;
      let len=NT, r=0;
      while(len>1){
        const half=len>>1;
        const fwr = fixedWin ? fixedWin[r] : null;
        for(let m=0;m<half;m++){
          const fx = fwr ? fwr[m] : null;
          if(fx!=null){ nxt[m]=fx; }                       // echtes Ergebnis: Sieger steht fest
          else {
            const a=cur[2*m], b=cur[2*m+1];
            const ea = 1/(1+Math.exp(LN10*(pts[b]-pts[a])/DIV));
            nxt[m] = Math.random()<ea ? a : b;
          }
        }
        for(let m=0;m<half;m++) cur[m]=nxt[m];
        len=half; r++;
        const arr = half===16?af : half===8?vf : half===4?hf : half===2?fin : tit;
        for(let m=0;m<half;m++) arr[cur[m]]++;
      }
    }
    const out=[];
    for(let i=0;i<NT;i++) out.push({
      i, af:af[i]/N*100, vf:vf[i]/N*100, hf:hf[i]/N*100, fin:fin[i]/N*100, tit:tit[i]/N*100
    });
    return out;
  }

  // ---- Einzel: ein Turnier, voller Verlauf inkl. Spiel um Platz 3 ----
  // ===== Ergebnis-Modell: plausibler Score zu gegebener Elo-Siegquote =====
  // Datenbasis: 1052 WM-Spiele. Sieger bleibt hart über Elo (Quoten exakt),
  // nur der Score wird per Poisson drangehängt, konditioniert auf den Sieger.
  const MU=2.7;                 // erwartete Gesamttore/Spiel (90 Min, moderne Ära)
  const PK=11;                  // Tor-Obergrenze für pmf-Summen
  const SCALE=1.62677;          // eicht Phasen-Rate auf 33,5% K.o.-Schnitt
  const PEN=21.3/33.5;          // Anteil Elfmeterschießen an "über 90 hinaus"
  const REMIS_B=[0,1,2,3], REMIS_W=[0.36,0.43,0.16,0.05]; // Remis-Stände (Daten)

  function poissonPmf(lam){
    const a=new Array(PK); a[0]=Math.exp(-lam);
    for(let k=1;k<PK;k++) a[k]=a[k-1]*lam/k;
    return a;
  }
  function poissonSample(lam){
    const L=Math.exp(-lam); let k=0, pr=1;
    do{ k++; pr*=Math.random(); } while(pr>L);
    return k-1;
  }
  function pick(vals, ws){
    let u=Math.random();
    for(let i=0;i<vals.length;i++){ u-=ws[i]; if(u<0) return vals[i]; }
    return vals[vals.length-1];
  }
  // Favoriten-Toranteil s, so dass bedingtes Poisson die Siegquote p (>=.5) trifft
  function condWinProb(s){
    const pf=poissonPmf(MU*s), pu=poissonPmf(MU*(1-s));
    let PF=0,PU=0;
    for(let i=0;i<PK;i++) for(let j=0;j<PK;j++){
      if(i>j) PF+=pf[i]*pu[j]; else if(i<j) PU+=pf[i]*pu[j];
    }
    return PF/(PF+PU);
  }
  function sForP(p){
    if(Math.abs(p-0.5)<1e-9) return 0.5;
    if(p<0.5) return 1-sForP(1-p);
    let lo=0.5, hi=0.9999;
    for(let i=0;i<50;i++){ const m=(lo+hi)/2; if(condWinProb(m)<p) lo=m; else hi=m; }
    return (lo+hi)/2;
  }
  // reguläres Ergebnis: bedingtes Poisson, gibt [Sieger-Tore, Verlierer-Tore]
  function scoreReg(favWins, lamF, lamU){
    for(let it=0; it<80; it++){
      const gF=poissonSample(lamF), gU=poissonSample(lamU);
      if(gF===gU) continue;
      if((gF>gU)===favWins) return favWins ? [gF,gU] : [gU,gF];
    }
    return [1,0];
  }
  function scoreAet(){ const r=pick(REMIS_B,REMIS_W); return [r+(Math.random()<0.78?1:2), r]; }
  function scorePen(){ const w=pick([3,4,5],[0.42,0.40,0.18]), d=pick([1,2,3],[0.55,0.34,0.11]);
    return [w, Math.max(0,w-d)]; }

  // Ein K.o.-Spiel: Elo bestimmt Quote, Phase+Score werden plausibel gezogen
  function playMatch(ia, ib, pts){
    const ea = 1/(1+Math.exp(LN10*(pts[ib]-pts[ia])/DIV));  // P(a gewinnt)
    const aFav = ea>=0.5;
    const iFav = aFav?ia:ib, iUnd = aFav?ib:ia;
    const p = aFav?ea:1-ea;                                 // Favoriten-Quote >=.5
    const s = sForP(p), lamF=MU*s, lamU=MU*(1-s);
    const pf=poissonPmf(lamF), pu=poissonPmf(lamU);
    let rem=0; for(let k=0;k<PK;k++) rem+=pf[k]*pu[k];
    const over=Math.min(0.55, rem*SCALE);
    const Preg=1-over, Paet=over*(1-PEN), Ppen=over*PEN, base=Preg+Paet;
    let q=(p-0.5*Ppen)/base, qpen=0.5;
    if(q>1){ q=1; qpen=(p-base)/Ppen; }                     // Elfer-Verfeinerung
    const u=Math.random();
    const phase = u<Preg?'reg':(u<Preg+Paet?'aet':'pen');
    const favWins = (phase==='pen') ? (Math.random()<qpen) : (Math.random()<q);
    const iW = favWins?iFav:iUnd, iL = favWins?iUnd:iFav;
    const sc = phase==='reg' ? scoreReg(favWins,lamF,lamU)
             : phase==='aet' ? scoreAet() : scorePen();
    return {a:ia, b:ib, w:iW, l:iL, phase, sw:sc[0], sl:sc[1]};
  }

  function runOnce(){
    const pts = effPts();
    let cur = TEAMS.map((_,i)=>i);
    const rounds=[];
    while(cur.length>1){
      const ms=[], win=[];
      for(let m=0;m<cur.length;m+=2){
        const res = playMatch(cur[m], cur[m+1], pts);
        ms.push(res); win.push(res.w);
      }
      rounds.push(ms); cur=win;
    }
    const champ = cur[0];
    const finalM = rounds[rounds.length-1][0];
    const vize = finalM.l;
    const hfR = rounds[rounds.length-2];          // 2 Halbfinals
    const l1=hfR[0].l, l2=hfR[1].l;
    const third3 = playMatch(l1, l2, pts);        // Spiel um Platz 3
    return {rounds, champ, vize, third:third3.w, fourth:third3.l, l1, l2, finalM, third3};
  }

  // ---------- Rendering ----------
  const $ = id => document.getElementById(id);

  // ---- Info-Erklärungen (Popups) ----
  const INFO = {
    div:{t:"Divisor", h:`<p>Steuert über die Elo-Logik, wie stark der Punkteunterschied zweier Teams die Siegchance bestimmt.</p><p><b>Links (klein, bis 300):</b> schärfer — schon kleine Vorsprünge machen den Favoriten fast unschlagbar.<br><b>Rechts (groß, bis 800):</b> ausgeglichener — auch Außenseiter haben realistische Chancen.</p><p>P(A&nbsp;schlägt&nbsp;B) = 1 / (1 + 10^((P<sub>B</sub>−P<sub>A</sub>)/Divisor)). Bei 600 ergibt ein Vorsprung von 600&nbsp;Punkten rund 91&nbsp;% Siegchance, bei 300 schon ~99&nbsp;%.</p>`},
    home:{t:"Heimvorteil", h:`<p>Die Gastgeber <b>USA, Kanada und Mexiko</b> bekommen einen Bonus auf ihre Weltranglisten-Punkte, um den Heimvorteil abzubilden.</p><p>Der Regler stellt die Höhe ein (0–150&nbsp;Punkte). Zur Einordnung: 75&nbsp;Punkte entsprechen etwa dem Abstand zwischen einem starken und einem mittleren Team.</p>`},
    tf:{t:"Turnierfaktor", h:`<div class="iwarn">⚠ Statistisch <b>nicht</b> nachweisbar (I²&nbsp;=&nbsp;0&nbsp;%, p&nbsp;=&nbsp;0,54). Reines „Was wäre, wenn die Punktschätzungen doch etwas bedeuten“. Nur die 19&nbsp;Teams mit ≥&nbsp;5 WM-Teilnahmen erhalten einen Wert; die übrigen 13 bleiben ohne Bonus.</div><p>Der Faktor misst, wie stark ein Team in seinen WM-Spielen vom <b>Elo-Erwartungswert</b> abwich (Elfmeterschießen elo-neutral). Positiv = lief im Turnier über der eigenen Spielstärke; der Wert wird als Elo-Bonus eingerechnet.</p><div class="fp-title">Turnierfaktor je Team · 95 %-Intervalle</div><div id="fpHost"></div><p>Jedes Intervall kreuzt die Null, der gepoolte Effekt (Raute) liegt praktisch bei null — <b>kein nachweisbarer Turnier-Effekt</b>. Deshalb nur ein An/Aus-Schalter, keine Feinregelung.</p>`},
    live:{t:"Live-Modus", h:`<p>Spielt ein komplettes Turnier in Echtzeit ab: Die Tore fallen über die 90 Minuten, danach folgen bei Gleichstand Verlängerung und Elfmeterschießen. Alle Spiele einer Runde laufen gleichzeitig (Konferenz).</p><p>Der Regler stellt ein, wie lange die regulären 90 Minuten dauern (10 s bis 2 min); die Verlängerung kommt zeitlich obendrauf.</p><p><b>Wichtig:</b> Die Ergebnisse sind exakt dieselben wie unter „Ein Turnier" — der Live-Modus zeigt nur, <i>wie</i> sie zustande kommen.</p>`},
    boxes:{t:"Kästchen, Spalten & Balken", h:`<p>Vorne fünf Kästchen für den Stand im Turnier: <b>SF</b>&nbsp;Sechzehntelfinale, <b>AF</b>&nbsp;Achtelfinale, <b>VF</b>&nbsp;Viertelfinale, <b>HF</b>&nbsp;Halbfinale, <b>F</b>&nbsp;Finale.</p><p><span class="ibox bd"></span>&nbsp;Runde überstanden &nbsp; <span class="ibox bn"></span>&nbsp;steht dort gerade &nbsp; <span class="ibox bo"></span>&nbsp;dort ausgeschieden &nbsp; <span class="ibox be"></span>&nbsp;noch nicht erreicht.</p><p>Die Spalten <b>AF/VF/HF/F</b> sind die Wahrscheinlichkeiten, die jeweilige Runde zu erreichen, <b>WM</b> die Titelchance (mit Balken rechts). In <b>Jetzt</b> ist die <span style="color:#f4c64a;font-weight:800">nächste Hürde</span> fett-gold (die Chance, die aktuelle Runde zu überstehen). Bei schon überstandenen Runden steht dezent die <b>Vorab-Chance</b> (Start-Prognose), diese Runde zu erreichen — so sieht man, wie überraschend der bisherige Weg war (z.&nbsp;B. 30&nbsp;% = starker Erfolg).</p><p><b>Jetzt</b> rechnet bedingt auf die bisherigen echten Ergebnisse: ausgeschiedene Teams stehen auf 0&nbsp;% und rutschen ans Ende. <b>Start</b> friert die Vorturnier-Prognose ein — alle Zahlen normal, als Vergleich.</p>`},
    tabs:{t:"Die drei Ansichten", h:`<p><b>Titelchancen:</b> Aus zehntausenden simulierten Turnieren wird die Weltmeister-Wahrscheinlichkeit jedes Teams gezählt. <b>Jetzt</b> rechnet bedingt auf die bisherigen echten Ergebnisse, <b>Start</b> zeigt die eingefrorene Prognose von vor der K.-o.-Runde. Die fünf Kästchen hinter jedem Team zeigen die erreichte Runde (Details über das i daneben).</p><p><b>Ein mögliches Turnier:</b> Es wird genau <b>ein</b> Turnier ausgelost und der komplette K.-o.-Baum mit konkreten Ergebnissen gezeigt — ein einzelnes Beispiel, wie die WM ablaufen könnte. Jedes Würfeln liefert ein neues.</p><p><b>Live:</b> Dasselbe Turnier, aber in Echtzeit miterlebt — die Tore fallen über die Spielzeit, mit Verlängerung und Elfmeterschießen.</p>`}
  };
  const imodal=$("imodal"), imodalTitle=$("imodalTitle"), imodalBody=$("imodalBody");
  function openInfo(key){
    const it=INFO[key]; if(!it) return;
    imodalTitle.textContent=it.t; imodalBody.innerHTML=it.h;
    imodal.classList.add("on");
    if(key==="tf"){ const fh=$("fpHost"); if(fh) fh.innerHTML=buildForestSVG(); }
  }
  function closeInfo(){ imodal.classList.remove("on"); }
  document.querySelectorAll(".ibtn").forEach(btn=>btn.addEventListener("click",()=>openInfo(btn.dataset.info)));
  const probList=$("probList"), probStatus=$("probStatus");
  let probView='now';                              // 'now' = bedingt auf Ergebnisse | 'start' = eingefroren
  let nowData=null, startData=null, koProg=null, lastMs=0;

  function funnelBar(tit, maxTit){
    const w = maxTit>0 ? Math.min(100, tit/maxTit*100) : 0;
    return `<span class="fbar" style="background:linear-gradient(90deg,#f4c64a 0%,#f4c64a ${w.toFixed(1)}%,#141f33 ${w.toFixed(1)}%)"></span>`;
  }

  // 5 Fortschritts-Kästchen aus dem Team-Fortschritt (SF·AF·VF·HF·F)
  function progBoxes(pr){
    const reached=pr.reached, st=pr.status;
    let bx='';
    for(let k=0;k<5;k++){
      let cls;
      if(st==='champion')      cls = k<4 ? 'done':'now';
      else if(k<reached)       cls = 'done';
      else if(k===reached)     cls = (st==='out') ? 'out':'now';
      else                     cls = '';
      bx += `<i class="${cls}"></i>`;
    }
    return `<span class="boxes">${bx}</span>`;
  }

  // Vier Runden-Zahlen AF/VF/HF/F. In "Jetzt": erledigte = 100 dezent, nächste Hürde fett-gold.
  function roundCells(d, s, pr){
    const vals=[d.af, d.vf, d.hf, d.fin];
    const svals = s ? [s.af, s.vf, s.hf, s.fin] : vals;   // Start-Prognose (Vorab-Chance)
    const reached=pr.reached, out=pr.status==='out';
    let h='';
    for(let j=0;j<4;j++){
      if(probView==='now' && out){ h+=`<span class="col gone">–</span>`; continue; }
      let cls='col', val=vals[j];
      if(probView==='now'){
        if(j<reached){ cls+=' done'; val=svals[j]; }   // schon überstanden → Vorab-Chance (Start) statt 100
        else if(j===reached) cls+=' next';             // aktuelle Hürde → fett
      }
      h+=`<span class="${cls}">${Math.round(val)}</span>`;
    }
    return h;
  }
  // Kopfzeile (unsichtbare Kästchen als Platzhalter, damit Spalten exakt fluchten)
  function probHead(){
    return `<div class="phead"><span class="pf"></span><span class="pteam"></span>`
      + `<span class="boxes" style="visibility:hidden"><i></i><i></i><i></i><i></i><i></i></span>`
      + `<span class="col">AF</span><span class="col">VF</span><span class="col">HF</span><span class="col">F</span>`
      + `<span class="pwm">WM</span><span class="pfunnel"></span></div>`;
  }

  function renderProb(){
    const data = probView==='now' ? nowData : startData;
    if(!data || !koProg) return;
    const code = nameMode==='code';
    const startByI = {};
    if(startData) startData.forEach(s=>{ startByI[s.i]=s; });   // Vorab-Chancen je Team
    const rows = data.map(d=>({d, pr:koProg[d.i]}));

    if(probView==='now'){
      rows.sort((x,y)=>{                              // Titelchance absteigend, Ausgeschiedene (0 %) ans Ende
        const xo=x.pr.status==='out', yo=y.pr.status==='out';
        if(xo!==yo) return xo?1:-1;
        return y.d.tit - x.d.tit;
      });
    } else {
      rows.sort((x,y)=> y.d.tit - x.d.tit);           // Start: nach eingefrorener Chance, alle bleiben in der Liste
    }
    const maxTit = rows.reduce((mx,r)=>{
      const v = (probView==='now' && r.pr.status==='out') ? 0 : r.d.tit;
      return v>mx ? v : mx;
    }, 0) || 1;

    let html=probHead(), topN=0, divDone=false;
    rows.forEach(({d,pr})=>{
      const t=TEAMS[d.i], out=pr.status==='out';
      if(probView==='now' && out && !divDone){ html += `<div class="pdiv">ausgeschieden · 0&nbsp;%</div>`; divDone=true; }
      const isTop = !out && topN<4; if(isTop) topN++;
      const titVal = (probView==='now' && out) ? 0 : d.tit;
      const pct = titVal.toFixed(1).replace('.',',');
      html += `<div class="prow${isTop?' top':''}${out?' dead':''}"><span class="pf">${t.f}</span>`
        + `<span class="pteam">${code?t.c:t.n}</span>`
        + progBoxes(pr)
        + roundCells(d, startByI[d.i], pr)
        + `<span class="pwm">${pct}</span>`
        + `<span class="pfunnel">${funnelBar(titVal, maxTit)}</span></div>`;
    });
    probList.innerHTML = html;
    probList.className = 'rowlist ' + (code ? 'mode-c' : 'mode-n');

    const base = `${NRUN.toLocaleString("de-DE")} Turniere · Divisor ${DIV}`
      + (HOME_ON?` · Heim +${HOME_BONUS}`:``) + (TF_ON?` · TF ${Math.round(TF_STR*100)} %`:``);
    probStatus.innerHTML = probView==='now'
      ? `<b style="color:var(--gold)">Jetzt</b> · bedingt auf bisherige Ergebnisse · ${base} · ${lastMs.toFixed(0)} ms`
      : `<b>Start</b> · Prognose vor der K.-o.-Runde, eingefroren · ${base}`;
  }

  let pending=false;
  function recompute(){
    if(pending) return;
    pending=true;
    probStatus.textContent = `Simuliere ${NRUN.toLocaleString("de-DE")} Turniere …`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const fw = buildFixed(readBracket());
      koProg = TEAMS.map((_,i)=>teamProgress(i, fw));
      const t0=performance.now();
      nowData   = runMany(NRUN, fw);     // bedingt auf echte Ergebnisse
      startData = runMany(NRUN, null);   // reine Vorturnier-Prognose
      lastMs = performance.now()-t0;
      renderProb();
      pending=false;
    }));
  }
  // Umschalten Jetzt/Start ohne neue Simulation
  function rerenderProb(){ if(nowData && koProg) renderProb(); else recompute(); }

  const RLAB=["Letzte 32","Achtelf.","Viertelf.","Halbf.","Finale"];
  const RCOUNT=[16,8,4,2,1];
  let tzoom=1.0;

  // Spaltenbreiten so berechnen, dass alle 5 Runden in die Bildschirmbreite passen
  function layoutTree(){
    const wrap=$("treeWrap"), tree=$("tree");
    const availW = wrap.clientWidth - 14;          // wrap-padding (7*2)
    const GAP=6, gapsTotal=4*GAP;                   // 4 Lücken zwischen 5 Spalten
    const colW = Math.max(50, Math.floor((availW - gapsTotal) / 5));
    tree.style.setProperty("--colw", colW+"px");
  }

  function tslot(idx, isWin, goals, phase){
    const t=TEAMS[idx];
    let g='';
    if(goals!==null && goals!==undefined){
      const dg = goals>=10 ? 9 : goals;                       // einstellig halten
      const over = phase && phase!=='reg';                    // Spiel ging über 90
      let mk='', mkc='';                                      // nur bei Verlängerung/Elfer ein Kürzel
      if(isWin && over){ mk = phase==='pen'?'n.E.':'n.V.'; mkc='tmo'; }
      g = `<span class="tg">${dg}</span><span class="tm ${mkc}">${mk}</span>`;
    }
    return `<div class="tslot ${isWin?'win':'lose'}"><span class="tf">${t.f}</span>`
      + `<span class="tn">${teamLabel(t)}</span>${g}</div>`;
  }

  function renderTree(sim){
    const c=TEAMS[sim.champ];
    $("tree").classList.toggle('codemode', nameMode==='code');
    let html='<svg class="tlines"></svg>';
    for(let r=0;r<5;r++){
      const isFin = r===4;
      html += `<div class="tcol c${r}${isFin?' finalcol':''}">`
        + `<div class="tlabel">${RLAB[r]}</div>`;
      if(isFin) html += `<div class="finalwrap">`;
      for(let p=0;p<RCOUNT[r];p++){
        const m=sim.rounds[r][p];
        const show = scoresVisible();
        const ga = m.w===m.a ? m.sw : m.sl;
        const gb = m.w===m.b ? m.sw : m.sl;
        html += `<div class="mbox" data-r="${r}" data-p="${p}">`
          + tslot(m.a, m.w===m.a, show?ga:null, m.phase)
          + tslot(m.b, m.w===m.b, show?gb:null, m.phase) + `</div>`;
      }
      if(isFin){
        html += `<div class="champbox"><div class="cuptag">Weltmeister</div>`
          + `<span class="cup2">🏆</span>`
          + `<span class="cn"><span class="cf">${c.f}</span>${teamLabel(c)}</span></div></div>`;
      }
      html += `</div>`;
    }
    $("tree").innerHTML = html;
    layoutTree();
    applyTreeZoom();
    requestAnimationFrame(drawTreeLines);
    renderFinish(sim);
  }

  function boxRect(tree, base, z, r, p){
    const el = tree.querySelector(`.mbox[data-r="${r}"][data-p="${p}"]`);
    if(!el) return null;
    const b = el.getBoundingClientRect();
    return {l:(b.left-base.left)/z, r:(b.right-base.left)/z, t:(b.top-base.top)/z, h:b.height/z};
  }

  function drawTreeLines(){
    const tree=$("tree"); const svg=tree.querySelector("svg.tlines");
    if(!svg) return;
    const z=tzoom; const base=tree.getBoundingClientRect();
    const W=tree.offsetWidth, H=tree.offsetHeight;
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.setAttribute("width",W); svg.setAttribute("height",H);
    let paths="";
    for(let r=0;r<4;r++){
      for(let p=0;p<RCOUNT[r];p++){
        const a=boxRect(tree,base,z,r,p), par=boxRect(tree,base,z,r+1,Math.floor(p/2));
        if(!a||!par) continue;
        const sx=a.r, sy=a.t+a.h/2, dx=par.l, dy=par.t+par.h/2, mx=(sx+dx)/2;
        paths += `<path d="M${sx} ${sy} H${mx} V${dy} H${dx}" fill="none" stroke="#2a3a5e" stroke-width="1.4"/>`;
      }
    }
    const fin=boxRect(tree,base,z,4,0), cEl=tree.querySelector(".champbox");
    if(fin && cEl){
      const cb=cEl.getBoundingClientRect();
      const cx=(cb.left-base.left)/z + (cb.width/z)/2;   // Mitte der Champion-Box
      const cy=(cb.top-base.top)/z;                       // Oberkante Champion-Box
      const fx=fin.l + (fin.r-fin.l)/2;                   // Mitte des Finale-Matches
      const fyB=fin.t+fin.h;                              // Unterkante Finale-Match
      paths += `<path d="M${fx} ${fyB} V${cy}" fill="none" stroke="var(--gold)" stroke-width="1.6"/>`;
    }
    svg.innerHTML=paths;
  }

  function applyTreeZoom(){
    const tree=$("tree"), zEl=$("treeZoom");
    tree.style.transform = tzoom===1 ? "none" : `scale(${tzoom})`;
    zEl.style.width  = (tree.offsetWidth*tzoom)+"px";
    zEl.style.height = (tree.offsetHeight*tzoom)+"px";
  }

  function frow(pos,idx,gold){
    const t=TEAMS[idx];
    return `<div class="frow${gold?' gold':''}"><span class="fp">${pos}</span>`
      + `<span class="ff">${t.f}</span><span class="fn">${teamLabel(t)}</span></div>`;
  }
  function renderFinish(sim){
    $("singleFinish").innerHTML = `<div class="cup">🏆</div>`
      + `<div class="finish"><div class="ft">Endstand</div>`
      + frow(1,sim.champ,true) + frow(2,sim.vize,false)
      + frow(3,sim.third,false) + frow(4,sim.fourth,false) + `</div>`;
  }

  // ---------- UI-Verdrahtung ----------
  function setFill(el){
    const min=+el.min, max=+el.max, v=+el.value;
    el.style.setProperty("--fill", ((v-min)/(max-min)*100)+"%");
  }

  const divSld=$("divSld"), divVal=$("divVal");
  divSld.addEventListener("input",()=>{ DIV=+divSld.value; divVal.textContent=DIV; setFill(divSld);
    recompute(); });

  const homeTog=$("homeTog"), homeSld=$("homeSld"), homeHint=$("homeHint");
  function homeUpdate(){
    HOME_ON=homeTog.checked; HOME_BONUS=+homeSld.value;
    homeSld.disabled=!HOME_ON;
    homeHint.textContent = HOME_ON ? `+${HOME_BONUS}` : "aus";
    setFill(homeSld); recompute();
  }
  homeTog.addEventListener("change",homeUpdate);
  homeSld.addEventListener("input",homeUpdate);

  // ----- Turnierfaktor -----
  const tfTog=$("tfTog");
  function tfUpdate(){ TF_ON=tfTog.checked; recompute(); }   // feste Stärke 100 %, nur an/aus
  tfTog.addEventListener("change",tfUpdate);

  // Forest-Plot (19 belastbare Teams), als SVG im App-Stil
  const TF_DATA=[
    {n:"Kroatien",v:0.56,se:0.412},{n:"Belgien",v:0.51,se:0.292},
    {n:"Argentinien",v:0.48,se:0.415},{n:"Frankreich",v:0.47,se:0.475},
    {n:"Deutschland",v:0.40,se:0.336},{n:"Niederlande",v:0.35,se:0.424},
    {n:"Marokko",v:0.30,se:0.522},{n:"Paraguay",v:0.20,se:0.202},
    {n:"Schweiz",v:0.18,se:0.212},{n:"Brasilien",v:0.17,se:0.47},
    {n:"Mexiko",v:0.06,se:0.197},{n:"Kolumbien",v:-0.05,se:0.395},
    {n:"Schweden",v:-0.06,se:0.545},{n:"Australien",v:-0.09,se:0.272},
    {n:"Spanien",v:-0.12,se:0.228},{n:"Japan",v:-0.14,se:0.339},
    {n:"Portugal",v:-0.19,se:0.252},{n:"England",v:-0.32,se:0.262},
    {n:"USA",v:-0.36,se:0.211}
  ];
  function esc(s){return s;}
  function buildForestSVG(){
    const W=336, padL=84, padR=30, plotW=W-padL-padR;
    const rowH=14, top=5, n=TF_DATA.length;
    const diaY=top+n*rowH+12, H=diaY+16;
    const xmin=-0.75, xmax=0.75;
    const xs=v=> padL + (Math.max(xmin,Math.min(xmax,v))-xmin)/(xmax-xmin)*plotW;
    const xc=v=> padL + (v-xmin)/(xmax-xmin)*plotW; // ungeklemmt, fürs Mittel
    const x0=xs(0);
    const ws=TF_DATA.map(d=>1/(d.se*d.se));
    const wmin=Math.min(...ws), wmax=Math.max(...ws);
    let s=`<svg class="fpsvg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    s+=`<line x1="${x0}" y1="${top-2}" x2="${x0}" y2="${diaY+5}" stroke="#9fb0d6" stroke-width="1" stroke-dasharray="3 3" opacity="0.65"/>`;
    [-0.5,0,0.5].forEach(t=>{ s+=`<text x="${xc(t)}" y="${H-2}" fill="#9fb0d6" font-size="8" text-anchor="middle">${t>0?'+':''}${t}</text>`; });
    TF_DATA.forEach((d,i)=>{
      const y=top+i*rowH+rowH/2;
      const lo=xs(d.v-2*d.se), hi=xs(d.v+2*d.se);
      const r=2.3+(1/(d.se*d.se)-wmin)/(wmax-wmin)*3.0;
      s+=`<text x="${padL-5}" y="${y+3}" fill="#e7edff" font-size="9" text-anchor="end">${d.n}</text>`;
      s+=`<line x1="${lo}" y1="${y}" x2="${hi}" y2="${y}" stroke="#5a6a8e" stroke-width="1.2"/>`;
      s+=`<circle cx="${xs(d.v)}" cy="${y}" r="${r.toFixed(1)}" fill="#6e9bf0" stroke="#0f1830" stroke-width="0.8"/>`;
      s+=`<text x="${W-2}" y="${y+3}" fill="#9fb0d6" font-size="8" text-anchor="end">${d.v>0?'+':''}${d.v.toFixed(2)}</text>`;
    });
    const gv=0.047, gse=0.066, dc=xc(gv), dl=xc(gv-2*gse), dr=xc(gv+2*gse), dh=4;
    s+=`<polygon points="${dl},${diaY} ${dc},${diaY-dh} ${dr},${diaY} ${dc},${diaY+dh}" fill="#f4c64a" stroke="#0f1830" stroke-width="0.8"/>`;
    s+=`<text x="${padL-5}" y="${diaY+3}" fill="#f4c64a" font-size="8.5" font-weight="700" text-anchor="end">Gepoolt</text>`;
    s+=`</svg>`;
    return s;
  }



  $("imodalX").addEventListener("click",closeInfo);
  imodal.addEventListener("click",e=>{ if(e.target===imodal) closeInfo(); });

  $("simBtn").addEventListener("click", ()=>{ recompute(); requestAnimationFrame(()=>$("viewProb").querySelector(".actionrow").scrollIntoView({behavior:"smooth", block:"start"})); });

  // Tabs
  const tabProb=$("tabProb"), tabSingle=$("tabSingle"), tabLive=$("tabLive");
  const viewProb=$("viewProb"), viewSingle=$("viewSingle"), viewLive=$("viewLive");
  let rolledOnce=false;
  function showTab(which){
    const p=which==="prob", s=which==="single", l=which==="live";
    tabProb.classList.toggle("on",p); tabSingle.classList.toggle("on",s); tabLive.classList.toggle("on",l);
    viewProb.classList.toggle("on",p); viewSingle.classList.toggle("on",s); viewLive.classList.toggle("on",l);
    if(p){ activeNameTab='prob'; nameMode=modeByTab.prob; syncNmtog(); if(nowData && koProg) renderProb(); else recompute(); }
    if(s){ activeNameTab='single'; nameMode=modeByTab.single; syncNmtog(); if(lastSim) renderTree(lastSim); }
    if(s && !rolledOnce){ rolledOnce=true; requestAnimationFrame(roll); }
    if(!l) stopLive();
  }
  tabProb.addEventListener("click",()=>showTab("prob"));
  tabSingle.addEventListener("click",()=>showTab("single"));
  tabLive.addEventListener("click",()=>showTab("live"));

  // Umschalter Jetzt / Start
  const segNow=$("segNow"), segStart=$("segStart");
  function setView(v){ if(probView===v) return; probView=v;
    segNow.classList.toggle("on", v==='now'); segStart.classList.toggle("on", v==='start'); rerenderProb(); }
  segNow.addEventListener("click",()=>setView('now'));
  segStart.addEventListener("click",()=>setView('start'));

  // Bracket-Ergebnis hat sich geändert (anderes iframe, gleicher Origin) -> Jetzt-Prognose neu
  window.addEventListener("storage", e=>{
    if(e.key!==KO_STORE_KEY && e.key!==null) return;
    if(viewProb.classList.contains("on")) recompute();   // sichtbar: sofort neu rechnen
    else { nowData=null; koProg=null; }                  // sonst beim nächsten Öffnen
  });

  function roll(){ lastSim = runOnce(); renderTree(lastSim);
    requestAnimationFrame(()=>viewSingle.querySelector(".actionrow").scrollIntoView({behavior:"smooth", block:"start"})); }
  $("rollBtn").addEventListener("click",roll);

  // ===== Live-Modus =====
  const conf=$("conf"), liveRound=$("liveRound"), liveClock=$("liveClock");
  const liveBtn=$("liveBtn"), liveDur=$("liveDur"), liveDurVal=$("liveDurVal");
  const RLABEL=["Sechzehntelfinale","Achtelfinale","Viertelfinale","Halbfinale","Finale"];
  let liveNameMode="code", liveAbort=false, liveRunning=false, liveTimer=null, liveRaf=null, liveMatches=null, liveSim=null, liveScrolled=false;
  const liveLabel = t => liveNameMode==="code" ? t.c : t.n;
  function fmtDur(s){ return s<60 ? s+" s" : (s%60===0 ? (s/60)+" min" : Math.floor(s/60)+":"+String(s%60).padStart(2,"0")+" min"); }
  function durUpdate(){ liveDurVal.textContent=fmtDur(+liveDur.value); setFill(liveDur); }
  liveDur.addEventListener("input",durUpdate); durUpdate();

  // Tor-Minuten aus dem fertigen Spiel ableiten (rein kosmetisch -> Endergebnis bleibt exakt gleich)
  function genEvents(m){
    const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
    const aWin=(m.w===m.a), wS=aWin?"a":"b", lS=aWin?"b":"a", ev=[];
    if(m.phase==="reg"){
      for(let i=0;i<m.sw;i++) ev.push({min:rnd(1,90),s:wS});
      for(let i=0;i<m.sl;i++) ev.push({min:rnd(1,90),s:lS});
    } else if(m.phase==="aet"){
      for(let i=0;i<m.sl;i++){ ev.push({min:rnd(1,90),s:wS}); ev.push({min:rnd(1,90),s:lS}); }
      for(let i=0;i<m.sw-m.sl;i++) ev.push({min:rnd(91,120),s:wS});
    } else {
      const base=[0,1,2][rnd(0,2)];
      for(let i=0;i<base;i++){ ev.push({min:rnd(1,90),s:wS}); ev.push({min:rnd(1,90),s:lS}); }
    }
    ev.sort((x,y)=>x.min-y.min);
    return {ev, wS, lS};
  }
  function confRow(i,m){
    const ta=TEAMS[m.a], tb=TEAMS[m.b];
    return `<div class="cmatch live" data-ci="${i}">`
      + `<span class="cteam home" data-side="a"><span class="cf">${ta.f}</span><span class="cn">${liveLabel(ta)}</span></span>`
      + `<span class="cscore" data-sc="${i}">0:0</span>`
      + `<span class="cteam away" data-side="b"><span class="cf">${tb.f}</span><span class="cn">${liveLabel(tb)}</span></span></div>`;
  }
  function updateLiveNames(){
    if(liveMatches) liveMatches.forEach((m,i)=>{ const el=conf.querySelector(`.cmatch[data-ci="${i}"]`); if(!el) return;
      el.querySelector('[data-side="a"] .cn').textContent=liveLabel(TEAMS[m.a]);
      el.querySelector('[data-side="b"] .cn').textContent=liveLabel(TEAMS[m.b]); });
    if(liveSim && $("liveFinish").innerHTML) renderLiveFinish(liveSim);
  }
  viewLive.querySelectorAll(".nmtog button").forEach(btn=>btn.addEventListener("click",()=>{
    viewLive.querySelectorAll(".nmtog button").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on"); liveNameMode=btn.dataset.lmode; updateLiveNames();
  }));
  const liveSleep = ms => new Promise(r=>{ liveTimer=setTimeout(r,ms); });
  function stopLive(){ liveAbort=true; liveRunning=false;
    if(liveTimer) clearTimeout(liveTimer); if(liveRaf) cancelAnimationFrame(liveRaf);
    liveBtn.textContent="▶ Anpfiff"; }
  function flashScore(i,txt){ const el=conf.querySelector(`.cscore[data-sc="${i}"]`);
    if(!el) return; el.textContent=txt; el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash"); }
  const endMinOf = m => m.phase==="reg" ? 90 : 120;   // Spiel-Schlusszeit
  function updateLead(i,sc){
    const el=conf.querySelector(`.cmatch[data-ci="${i}"]`); if(!el) return;
    el.querySelector('[data-side="a"]').classList.toggle("lead", sc.a>sc.b);
    el.querySelector('[data-side="b"]').classList.toggle("lead", sc.b>sc.a);
  }
  function markDone(m,i){
    const el=conf.querySelector(`.cmatch[data-ci="${i}"]`); if(!el || el.classList.contains("done")) return;
    el.classList.remove("live"); el.classList.add("done");
    const aWin=(m.w===m.a);
    const ha=el.querySelector('[data-side="a"]'), hb=el.querySelector('[data-side="b"]');
    ha.classList.add(aWin?"win":"lose"); hb.classList.add(aWin?"lose":"win");
    ha.classList.toggle("lead",aWin); hb.classList.toggle("lead",!aWin);
    if(m.phase==="aet"){ const sc=el.querySelector(".cscore"); if(sc && !/n\.V\./.test(sc.textContent)) sc.textContent+=" n.V."; }
  }
  function animateRound(matches, evs, maxMin, durMs){
    return new Promise(resolve=>{
      const t0=performance.now(), fired=evs.map(e=>e.ev.map(()=>false)), sc=matches.map(()=>({a:0,b:0}));
      const ends=matches.map(endMinOf), done=matches.map(()=>false);
      function frame(now){
        if(liveAbort){ resolve(); return; }
        const prog=Math.min(1,(now-t0)/durMs), min=Math.round(prog*maxMin);
        liveClock.textContent=min+"'";
        for(let i=0;i<matches.length;i++){
          const mm=Math.min(min, ends[i]);                       // Spiel friert an seiner Schlusszeit ein
          for(let j=0;j<evs[i].ev.length;j++)
            if(!fired[i][j] && evs[i].ev[j].min<=mm){ fired[i][j]=true; sc[i][evs[i].ev[j].s]++; flashScore(i, sc[i].a+":"+sc[i].b); updateLead(i, sc[i]); }
          if(min>=ends[i] && !done[i] && matches[i].phase!=="pen"){ done[i]=true; markDone(matches[i],i); }
        }
        if(prog<1) liveRaf=requestAnimationFrame(frame); else resolve();
      }
      liveRaf=requestAnimationFrame(frame);
    });
  }
  async function animatePens(i,m,wS){
    const scEl=conf.querySelector(`.cscore[data-sc="${i}"]`); if(!scEl) return;
    const reg=scEl.textContent; let pw=0,pl=0;
    while((pw<m.sw || pl<m.sl) && !liveAbort){
      if(pw<m.sw){ pw++; const a=wS==="a"?pw:pl,b=wS==="a"?pl:pw; flashScore(i,`${reg} (${a}:${b} n.E.)`); await liveSleep(430); }
      if(pl<m.sl && !liveAbort){ pl++; const a=wS==="a"?pw:pl,b=wS==="a"?pl:pw; flashScore(i,`${reg} (${a}:${b} n.E.)`); await liveSleep(430); }
    }
  }
  async function playRound(label, matches, durSec){
    liveMatches=matches;
    const evs=matches.map(genEvents);
    const maxMin = matches.some(m=>m.phase!=="reg") ? 120 : 90;
    liveRound.textContent=label;
    conf.innerHTML=matches.map((m,i)=>confRow(i,m)).join("");
    if(!liveScrolled){ liveScrolled=true; requestAnimationFrame(()=>viewLive.querySelector(".actionrow").scrollIntoView({behavior:"smooth", block:"start"})); }
    await animateRound(matches, evs, maxMin, durSec*1000*(maxMin/90));
    for(let i=0;i<matches.length && !liveAbort;i++) if(matches[i].phase==="pen"){ await animatePens(i,matches[i],evs[i].wS); markDone(matches[i],i); }
  }
  function renderLiveFinish(sim){
    const fr=(pos,idx,gold)=>{ const t=TEAMS[idx];
      return `<div class="frow${gold?' gold':''}"><span class="fp">${pos}</span><span class="ff">${t.f}</span><span class="fn">${liveLabel(t)}</span></div>`; };
    $("liveFinish").innerHTML = `<div class="cup">🏆</div><div class="finish"><div class="ft">Endstand</div>`
      + fr(1,sim.champ,true)+fr(2,sim.vize,false)+fr(3,sim.third,false)+fr(4,sim.fourth,false)+`</div>`;
  }
  async function playLive(){
    const sim=runOnce(); lastSim=sim; liveSim=sim; rolledOnce=true;
    liveAbort=false; liveRunning=true; liveBtn.textContent="⏹ Stopp";
    $("liveFinish").innerHTML=""; liveScrolled=false;
    const durSec=+liveDur.value, nR=sim.rounds.length;
    for(let r=0; r<nR && !liveAbort; r++){
      await playRound(RLABEL[r], sim.rounds[r], durSec);
      if(r<nR-1 && !liveAbort) await liveSleep(950);
      if(r===nR-2 && !liveAbort){                          // nach dem Halbfinale
        await playRound("Spiel um Platz 3", [sim.third3], durSec);
        await liveSleep(950);
      }
    }
    if(!liveAbort){ liveRound.textContent="🏆 Endstand"; liveClock.textContent=""; renderLiveFinish(sim); renderTree(sim); }
    liveRunning=false; liveBtn.textContent="▶ Anpfiff"; liveMatches=null;
  }
  liveBtn.addEventListener("click",()=>{ if(liveRunning) stopLive(); else playLive(); });

  // Zoom Turnierbaum (100% = passt komplett; höher = Details, scrollbar)
  const tzSld=$("tzSld");
  function setTZoom(v){
    tzoom = Math.max(0.60, Math.min(2.20, v));
    tzSld.value = Math.round(tzoom*100);
    setFill(tzSld); applyTreeZoom();
    requestAnimationFrame(drawTreeLines);
  }
  tzSld.addEventListener("input", ()=> setTZoom(+tzSld.value/100));
  $("tzIn").addEventListener("click", ()=> setTZoom(tzoom+0.15));
  $("tzOut").addEventListener("click", ()=> setTZoom(tzoom-0.15));

  // Bei Größenänderung (Drehung) Spalten neu einpassen
  let rsz;
  window.addEventListener("resize", ()=>{
    clearTimeout(rsz);
    rsz = setTimeout(()=>{ if($("tree").children.length){ layoutTree(); applyTreeZoom();
      requestAnimationFrame(drawTreeLines); } }, 150);
  });

  // Namensanzeige umschalten (beide Toggle-Instanzen synchron, kein Neu-Rechnen)
  function syncNmtog(){
    const view = activeNameTab==='prob' ? viewProb : viewSingle;
    view.querySelectorAll(".nmtog button[data-mode]").forEach(b=>
      b.classList.toggle("on", b.dataset.mode===nameMode));
  }
  function setNameMode(m){
    if(m===nameMode) return;
    nameMode = m; modeByTab[activeNameTab] = m;
    syncNmtog();
    if(activeNameTab==='prob' && lastProb) renderProb(lastProb.data, lastProb.ms);
    if(activeNameTab==='single' && lastSim) renderTree(lastSim);
  }
  document.querySelectorAll(".nmtog").forEach(g=>
    g.addEventListener("click", e=>{
      const b=e.target.closest("button"); if(!b || !b.dataset.mode) return;
      setNameMode(b.dataset.mode);
    }));

  // Init
  setFill(divSld); setFill(homeSld); setFill(tzSld);
  recompute();
})();

  <script>
  (function(){
    "use strict";
    var fb=document.getElementById('fb'), fs=document.getElementById('fs');
    var loaded={b:false,s:false};
    function unesc(s){ return s.replace(/\[\[SCRIPTEND\]\]/g, '</'+'script>'); }
    function load(w){
      if(w==='b' && !loaded.b){ fb.srcdoc=unesc(document.getElementById('srcB').textContent); loaded.b=true; }
      if(w==='s' && !loaded.s){ fs.srcdoc=unesc(document.getElementById('srcS').textContent); loaded.s=true; }
    }
    function show(w){
      load(w);
      fb.classList.toggle('hidden', w!=='b');
      fs.classList.toggle('hidden', w!=='s');
      var tabs=document.querySelectorAll('.swtab');
      for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle('active', tabs[i].dataset.v===w); }
    }
    var tabs=document.querySelectorAll('.swtab');
    for(var i=0;i<tabs.length;i++){ tabs[i].addEventListener('click', (function(t){ return function(){ show(t.dataset.v); }; })(tabs[i])); }
    load('b'); // K.o.-Runde sofort, Simulation erst bei Bedarf

    // ---- Voller-Viewport-Lock: setzt die echte sichtbare Hoehe (iOS-PWA: dvh/vh/% greifen unten nicht zuverlaessig) ----
    function fitViewport(){ document.body.style.height = window.innerHeight + "px"; }
    fitViewport();
    window.addEventListener("resize", fitViewport);
    window.addEventListener("orientationchange", function(){ setTimeout(fitViewport, 250); });
    setTimeout(fitViewport, 300);   // iOS meldet innerHeight direkt nach Start manchmal zu frueh

    // ---- Push-Benachrichtigungen ----
    var VAPID_PUBLIC="BN4D-4wP9HRIVODTcIujObUQxfkUqy56KCLP9MZxln7arr1gchpqWQv8BG9m0xwqXASCkfNwUr6ta5jx6FUGJS4";
    var WORKER_URL="https://wm2026-push.lupert-trading.workers.dev";  // Worker-Endpoint (Cloudflare)
    function u8(b64){var pad="=".repeat((4-b64.length%4)%4);var s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/");var raw=atob(s);var a=new Uint8Array(raw.length);for(var i=0;i<raw.length;i++)a[i]=raw.charCodeAt(i);return a;}
    var ov=document.getElementById("pushOv"),pmsg=document.getElementById("pushMsg"),psub=document.getElementById("pushSub"),pcopy=document.getElementById("pushCopy"),bell=document.getElementById("bellBtn");
    function openOv(text,sub){pmsg.textContent=text;if(sub){psub.value=sub;psub.classList.remove("hidden");pcopy.classList.remove("hidden");}else{psub.classList.add("hidden");pcopy.classList.add("hidden");}ov.classList.remove("hidden");}
    document.getElementById("pushClose").addEventListener("click",function(){ov.classList.add("hidden");});
    pcopy.addEventListener("click",function(){psub.select();try{document.execCommand("copy");}catch(e){}pcopy.textContent="Kopiert \u2713";});
    function enablePush(){
      var standalone=(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone;
      if(!("serviceWorker" in navigator)||!("PushManager" in window)||!("Notification" in window)){
        openOv("Push wird in diesem Kontext nicht unterst\u00fctzt. Auf dem iPhone: Teilen-Symbol \u2192 \u201eZum Home-Bildschirm\u201c, dann die App von dort \u00f6ffnen.");return;}
      if(/iPad|iPhone|iPod/.test(navigator.userAgent)&&!standalone){
        openOv("Bitte zuerst \u00fcber das Teilen-Symbol \u201eZum Home-Bildschirm\u201c hinzuf\u00fcgen und die App von dort (Vollbild) \u00f6ffnen. Dann hier erneut tippen.");return;}
      return navigator.serviceWorker.register("sw.js").then(function(reg){
        return navigator.serviceWorker.ready.then(function(){return reg;});
      }).then(function(reg){
        return Notification.requestPermission().then(function(perm){
          if(perm!=="granted"){openOv("Benachrichtigungen wurden nicht erlaubt. \u00c4nderbar in den iOS-Einstellungen unter \u201eMitteilungen\u201c.");return null;}
          return reg.pushManager.getSubscription().then(function(s){
            return s||reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:u8(VAPID_PUBLIC)});
          });
        });
      }).then(function(sub){
        if(!sub)return;
        bell.classList.add("on");
        if(WORKER_URL){
          var u=WORKER_URL.replace(/\/$/,"")+"/subscribe";
          fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(sub)})
            .then(function(r){ openOv(r.ok ? "Tor-Benachrichtigungen aktiviert \u2713  Du bekommst ab jetzt bei jedem Tor eine Nachricht \u2013 auch bei geschlossener App." : "Aktiviert, aber der Server hat das Abo abgelehnt (Status "+r.status+")."); })
            .catch(function(e){ openOv("Aktiviert, aber das Abo konnte nicht an den Server gesendet werden: "+(e&&e.message||e)); });
        } else {
          openOv("Benachrichtigungen aktiviert \u2713  (Noch keine Worker-URL hinterlegt \u2013 Abo unten zum Kopieren.)",JSON.stringify(sub));
        }
      }).catch(function(e){openOv("Fehler: "+(e&&e.message||e));});
    }
    function disablePush(){
      bell.classList.remove("on");
      if(!("serviceWorker" in navigator)){ openOv("Benachrichtigungen ausgeschaltet."); return Promise.resolve(); }
      return navigator.serviceWorker.getRegistration().then(function(reg){
        if(!(reg&&reg.pushManager)) return;
        return reg.pushManager.getSubscription().then(function(s){
          if(!s) return;
          var ep=s.endpoint;
          // erst dem Server das Abo abmelden (best effort), dann lokal kündigen
          var notify = WORKER_URL
            ? fetch(WORKER_URL.replace(/\/$/,"")+"/unsubscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({endpoint:ep})}).catch(function(){})
            : Promise.resolve();
          return notify.then(function(){ return s.unsubscribe().catch(function(){}); });
        });
      }).catch(function(){}).then(function(){
        openOv("Benachrichtigungen ausgeschaltet \u2713  Du bekommst keine Tor-Nachrichten mehr. Zum Wiedereinschalten einfach erneut auf die Glocke tippen.");
      });
    }
    var pushBusy=false;   // Sperre: verhindert zweite parallele enable/disable-Kette (Doppeltippen -> Doppel-Abo)
    function togglePush(){
      if(pushBusy) return;
      pushBusy=true; bell.disabled=true;
      var run = bell.classList.contains("on") ? disablePush() : enablePush();
      Promise.resolve(run).catch(function(){}).then(function(){ pushBusy=false; bell.disabled=false; });
    }
    bell.addEventListener("click",togglePush);
    if("serviceWorker" in navigator){navigator.serviceWorker.getRegistration().then(function(reg){if(reg&&reg.pushManager)reg.pushManager.getSubscription().then(function(s){if(s)bell.classList.add("on");});}).catch(function(){});}
  })();
  </script>
