  const LABELS = ["Letzte 32","Achtelfinale","Viertelfinale","Halbfinale","Finale"];
  const COUNTS = [16,8,4,2,1]; // Spiele pro Runde

  // ---- State ----
  // winner[r][p] = 0 (oben) | 1 (unten) | null
  const winner = COUNTS.map(c => new Array(c).fill(null));
  // official[r][p] = true: echtes (beendetes) Ergebnis aus der Datenquelle -> gesperrt
  const official = COUNTS.map(c => new Array(c).fill(false));
  // scores[r][p] = [Tore oben, Tore unten]; dts[r][p] = [Datum, Uhrzeit]
  const scores = COUNTS.map(c => Array.from({length:c}, () => ["",""]));
  // telapsed[r][p] = time_elapsed der Quelle ("notstarted" | "finished" | Spielminute …); "" = noch unbekannt
  const telapsed = COUNTS.map(c => Array.from({length:c}, () => ""));
  // koStages[r][p] = Phasen einer K.o.-Entscheidung [{sc:[oben,unten], lbl}], letzte Stufe = entscheidend; sonst null. Nicht gespeichert.
  const koStages = COUNTS.map(c => new Array(c).fill(null));
  // Offizielle Termine WM 2026 (deutsche Zeit / MESZ), zugeordnet zur Bracket-Position.
  // Runde 0 in Setzliste-Reihenfolge; Folgerunden über Sieger-Nummern zugeordnet u. mehrfach verifiziert.
  const DTS = [
    // Letzte 32 (Paarungen 0..15)
    [["29.06.","22:30"],["30.06.","23:00"],["28.06.","21:00"],["30.06.","03:00"],
     ["04.07.","03:30"],["02.07.","21:00"],["02.07.","02:00"],["01.07.","22:00"],
     ["29.06.","19:00"],["30.06.","19:00"],["01.07.","03:00"],["01.07.","18:00"],
     ["04.07.","00:00"],["03.07.","20:00"],["03.07.","05:00"],["03.07.","01:00"]],
    // Achtelfinale (0..7)

     ["05.07.","22:00"],["06.07.","02:00"],["07.07.","18:00"],["07.07.","22:00"]],
    // Viertelfinale (0..3)

  const cloneDTS = () => DTS.map(rd => rd.map(m => [m[0], m[1]]));
  const dts    = cloneDTS();
  let third = null;        // 0|1|null – Sieger Spiel um Platz 3
  let official3 = false;   // echtes Ergebnis Spiel um Platz 3 -> gesperrt
  let score3 = ["",""];    // Ergebnis Spiel um Platz 3
  let telapsed3 = "";      // time_elapsed Spiel um Platz 3
  let koStages3 = null;    // Phasen Spiel um Platz 3, sonst null
  let dt3 = ["18.07.","23:00"];   // Datum/Uhrzeit Spiel um Platz 3
  let zoom = 0.7;          // Zoomfaktor (+/- Tasten) – Start etwas kleiner, beide Spalten sichtbar

  // ---- Speichern / Laden (eigene Eingaben bleiben beim nächsten Aufruf erhalten) ----
  const STORE_KEY = "wm2026-bracket-2";
  function saveState(){
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify({v:1, winner, scores, dts, third, score3, dt3, official, official3, telapsed, telapsed3}));
    }catch(e){/* z.B. privater Modus / Vorschau – dann eben nicht gespeichert */}
  }
  function loadState(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(!d || d.v!==1) return;
      const S = x => String(x==null?"":x);
      for(let r=0;r<COUNTS.length;r++) for(let p=0;p<COUNTS[r];p++){
        if(d.winner && d.winner[r] && (d.winner[r][p]===0||d.winner[r][p]===1||d.winner[r][p]===null))
          winner[r][p]=d.winner[r][p];
        if(d.scores && d.scores[r] && Array.isArray(d.scores[r][p]))
          scores[r][p]=[S(d.scores[r][p][0]), S(d.scores[r][p][1])];
        if(d.dts && d.dts[r] && Array.isArray(d.dts[r][p]))
          dts[r][p]=[S(d.dts[r][p][0]), S(d.dts[r][p][1])];
        if(d.official && d.official[r] && typeof d.official[r][p]==="boolean")
          official[r][p]=d.official[r][p];
        if(d.telapsed && d.telapsed[r] && d.telapsed[r][p]!=null)
          telapsed[r][p]=S(d.telapsed[r][p]);
      }
      if(d.third===0||d.third===1||d.third===null) third=d.third;
      if(typeof d.official3==="boolean") official3=d.official3;
      if(Array.isArray(d.score3)) score3=[S(d.score3[0]), S(d.score3[1])];
      if(Array.isArray(d.dt3))    dt3=[S(d.dt3[0]), S(d.dt3[1])];
      if(d.telapsed3!=null) telapsed3=S(d.telapsed3);
    }catch(e){/* defekter Speicher -> Default-Stand */}
  }

  // Team in Slot (r,p,side)
  function slotTeam(r,p,side){
    if(r===0) return TEAMS[p*2+side];
    const cp = p*2+side;
    const w = winner[r-1][cp];
    return w===null ? null : slotTeam(r-1,cp,w);
  }
  function loserTeam(r,p){
    const w = winner[r][p];
    return w===null ? null : slotTeam(r,p, w===0?1:0);
  }

  // Sieger aus Ergebnis: eindeutig -> 0/1, sonst null (Gleichstand/leer)
  function scoreWinner(a,b){
    if(a==="" || b==="") return null;
    const na=+a, nb=+b;
    if(Number.isNaN(na) || Number.isNaN(nb)) return null;
    if(na>nb) return 0;
    if(nb>na) return 1;
    return null;
  }

  // Folgerunden (Sieger + Ergebnisse) entwerten, wenn sich etwas ändert
  function invalidateAfter(r,p){
    for(let rr=r+1; rr<COUNTS.length; rr++){
      const pp = Math.floor(p / Math.pow(2, rr-r));
      winner[rr][pp]=null;
      scores[rr][pp]=["",""];        // Tore gehören zu konkreten Teams -> löschen
      official[rr][pp]=false;        // gelöschtes Folge-Ergebnis ist nicht mehr "echt"
      telapsed[rr][pp]="";           // Status gehört zur alten Paarung -> löschen
      koStages[rr][pp]=null;         // K.o.-Phasen gehören zur alten Paarung -> löschen
    }
    third=null; score3=["",""]; official3=false; telapsed3=""; koStages3=null;   // HF-Verlierer können sich geändert haben
  }

  function setWinner(r,p,side){
    if(winner[r][p]===side){ winner[r][p]=null; }   // erneut tippen = abwählen
    else { winner[r][p]=side; }
    invalidateAfter(r,p);
    render();
  }

  const bracket=document.getElementById("bracket");
  const thirdEl=document.getElementById("third");

  function esc(s){ return (s==null?"":(""+s)).replace(/"/g,"&quot;"); }

  // Anpfiff als UTC-ms aus dts = ["29.06.","22:30"] (deutsche Zeit MESZ=UTC+2, Jahr 2026)
  function koTs(dd, tt){
    const m=String(dd||"").match(/(\d{1,2})\.(\d{1,2})\./);
    const t=String(tt||"").match(/(\d{1,2}):(\d{2})/);
    if(!m||!t) return null;
    return Date.UTC(2026, (+m[2])-1, +m[1], (+t[1])-2, +t[2], 0);
  }
  const SOON_MS = 60*60*1000;   // "bald" = ab 1 Stunde vor Anpfiff
  // Status eines Spiels: 'done' (beendet) | 'live' (läuft) | 'soon' (bald) | 'upcoming'
  function matchStatus(isOfficial, dd, tt, te){
    if(isOfficial) return 'done';
    te = String(te||"").toLowerCase();
    if(te==='finished') return 'done';
    if(te && te!=='notstarted') return 'live';   // Quelle meldet laufendes Spiel (Minute/Status)
    const ko=koTs(dd,tt); if(ko===null) return 'upcoming';
    const now=Date.now();
    if(te==='notstarted'){                        // Quelle: noch nicht angepfiffen -> nie "live"
      return (now>=ko-SOON_MS) ? 'soon' : 'upcoming';
    }
    // keine Quelle-Info (Spiel (noch) nicht in den Daten) -> nie "live" ohne Bestätigung
    if(now>=ko-SOON_MS) return 'soon';
    return 'upcoming';
  }

  // ---- Heute/Morgen-Markierung: welche Spiele sind heute/morgen, + Nummer des Tages ----
  // Spieldaten sind deutsche Wandzeit; "heute"/"morgen" in MESZ (UTC+2, WM im Sommer) berechnen.
  let dayMap = { map:{}, markedRounds:new Set() };
  function buildDayMap(){
    // "Spieltag" = Kalendertag von (Anpfiff − 6 h): US-Spiele, die in DE erst nach Mitternacht
    // bis 06:00 MESZ laufen, zählen noch zum Spieltag des Vorabends. Gleiche Regel für "jetzt".
    const SHIFT = 6*3600*1000, TZ = 2*3600*1000;   // 6 h Spieltag-Grenze, MESZ = UTC+2
    const dayKey = ts => { const d=new Date(ts + TZ - SHIFT);   // MESZ-Wandzeit, dann 6 h zurück
      return d.getUTCFullYear()*10000 + (d.getUTCMonth()+1)*100 + d.getUTCDate(); };
    const todayKey = dayKey(Date.now());
    const tomoKey  = dayKey(Date.now() + 86400000);
    const whenOf = ts => { const k=dayKey(ts); return k===todayKey?'today':(k===tomoKey?'tomorrow':null); };
    const items=[];
    for(let r=0;r<COUNTS.length;r++) for(let p=0;p<COUNTS[r];p++){
      const ko=koTs(dts[r][p][0], dts[r][p][1]); if(ko===null) continue;
      const w=whenOf(ko); if(!w) continue;
      items.push({key:r+"-"+p, ts:ko, when:w});
    }
    { const ko=koTs(dt3[0],dt3[1]); if(ko!==null){ const w=whenOf(ko); if(w) items.push({key:"t3", ts:ko, when:w}); } }
    const map={};
    ['today','tomorrow'].forEach(w=>{
      const g=items.filter(x=>x.when===w).sort((a,b)=>a.ts-b.ts);
      g.forEach((x,i)=>{ map[x.key]={when:w, num: g.length>1 ? i+1 : null}; });
    });
    const markedRounds=new Set();
    items.forEach(it=>markedRounds.add(it.key==='t3' ? 4 : (+it.key.split('-')[0])));
    return { map, markedRounds };
  }
  // baut die Streifen-/Datum-Teile für eine Kachel (key = "r-p" oder "t3"); rnd = Runde für Platz-Reservierung
  function dayParts(key, dateLabel, rnd){
    const di = dayMap.map[key];
    if(di){
      const cls = di.when==='today' ? 'heute' : 'morgen';
      const dcls = di.when==='today' ? 'd today' : 'd tomorrow';
      const word = di.when==='today' ? 'Heute' : 'Morgen';
      return { pairCls:'pair '+cls, accent:`<div class="accent">${di.num??''}</div>`,
               dLabel:word, dCls:dcls };
    }
    const reserve = dayMap.markedRounds.has(rnd);   // nur in Runden mit heute/morgen-Spiel
    return { pairCls:'pair plain'+(reserve?' reserve':''), accent:'',
             dLabel:dateLabel, dCls:'d' };
  }

  function slotHTML(r,p,side){
    const t=slotTeam(r,p,side);
    const w=winner[r][p];
    const val=esc(scores[r][p][side]);
    if(!t){
      return `<div class="slot empty"><span class="flag">·</span>`
           + `<span class="nm">Sieger</span>`
           + `<span class="score empty"></span></div>`;
    }
    let cls="slot";
    if(w===side) cls+=" win";
    else if(w!==null) cls+=" loser";
    if(official[r][p]) cls+=" locked";
    const st=matchStatus(official[r][p], dts[r][p][0], dts[r][p][1], telapsed[r][p]);
    const stg=koStages[r][p];
    let scHTML;
    if(stg && st==='done'){                              // K.o.-Entscheidung -> 1-3 gestaffelte Kästchen, letztes rot/grün
      scHTML = `<span class="boxes">` + stg.map((s,i)=>{
        let bc="bx"; if(i===stg.length-1) bc += (w===side)?" win":" los";
        return `<span class="${bc}">${s.sc[side]}</span>`;
      }).join("") + `</span>`;
    } else {
      const disp=(st==='live'||st==='done') ? (val||"–") : "–";   // vor Anpfiff keine 0:0
      scHTML = `<span class="score" data-fid="s-${r}-${p}-${side}">${disp}</span>`;
    }
    return `<div class="${cls}" data-r="${r}" data-p="${p}" data-s="${side}">`
         + `<span class="flag">${t.f}</span><span class="nm">${t.n}</span>${scHTML}</div>`;
  }

  // Label-Zeile unter der Paarung. Immer vorhanden (reserviert Höhe, damit alle Paarungen gleich hoch
  // sind und die Abstände konstant bleiben); Labels n.V./i.E. nur bei gestaffelten Kästchen.
  function koLabelRow(stg){
    if(!stg || stg.length<2) return `<div class="lblrow"></div>`;
    const lbls = stg.map(s=>`<span class="lb ${s.lbl==='n.V.'?'nv':(s.lbl==='i.E.'?'ie':'empty')}">${s.lbl||'·'}</span>`).join("");
    return `<div class="lblrow"><span class="sp"></span><span class="lbls">${lbls}</span></div>`;
  }
  function matchHTML(r,p){
    const d=esc(dts[r][p][0]), t=esc(dts[r][p][1]);
    const st=matchStatus(official[r][p], dts[r][p][0], dts[r][p][1], telapsed[r][p]);
    const stCls=(st==='soon')?' soon':(st==='live')?' live':'';
    const badge=(st==='live')?`<span class="livebadge">● LIVE</span>`:'';
    const dp=dayParts(r+"-"+p, d, r);
    return `<div class="match${stCls}" data-mr="${r}" data-mp="${p}">`
         + `<div class="dt">`
         + `<span class="${dp.dCls}">${dp.dLabel}</span>`
         + `<span class="t">${t}</span>`
         + `</div>${badge}`
         + `<div class="paircol"><div class="${dp.pairCls}">${dp.accent}`
         + `<div class="teams">${slotHTML(r,p,0)}${slotHTML(r,p,1)}</div></div>`
         + koLabelRow(koStages[r][p])
         + `</div></div>`;
  }

  // Spiel um Platz 3 – gleicher Look wie ein normales Spiel (Datum/Zeit vorne),
  // sitzt unter dem Finale. data-t3 statt data-r für die Sieger-Auswahl.
  function thirdMatchHTML(){
    const lA=loserTeam(3,0), lB=loserTeam(3,1);
    const d=esc(dt3[0]), t=esc(dt3[1]);
    const st=matchStatus(official3, dt3[0], dt3[1], telapsed3);
    const showSc=(st==='live'||st==='done');
    const row=(team,side)=>{
      const val=esc(score3[side]);
      if(!team) return `<div class="slot empty"><span class="flag">·</span>`
           + `<span class="nm">Verlierer HF</span>`
           + `<span class="score empty"></span></div>`;
      let cls="slot"+(third===side?" win":(third!==null?" loser":""));
      if(official3) cls+=" locked";
      let scH;
      if(koStages3 && st==='done'){
        scH = `<span class="boxes">` + koStages3.map((s,i)=>{
          let bc="bx"; if(i===koStages3.length-1) bc += (third===side)?" win":" los";
          return `<span class="${bc}">${s.sc[side]}</span>`;
        }).join("") + `</span>`;
      } else {
        scH = `<span class="score" data-fid="s3-${side}">${showSc?(val||"–"):"–"}</span>`;
      }
      return `<div class="${cls}" data-t3="${side}"><span class="flag">${team.f}</span>`
           + `<span class="nm">${team.n}</span>${scH}</div>`;
    };
    const stCls=(st==='soon')?' soon':(st==='live')?' live':'';
    const badge=(st==='live')?`<span class="livebadge">● LIVE</span>`:'';
    const dp=dayParts("t3", d, 4);
    return `<div class="match3">`
         + `<div class="m3lbl">Spiel um Platz 3</div>`
         + `<div class="match${stCls}">`
         + `<div class="dt">`
         + `<span class="${dp.dCls}">${dp.dLabel}</span>`
         + `<span class="t">${t}</span>`
         + `</div>${badge}`
         + `<div class="paircol"><div class="${dp.pairCls}">${dp.accent}`
         + `<div class="teams">${row(lA,0)}${row(lB,1)}</div></div>`
         + koLabelRow(koStages3)
         + `</div></div></div>`;
  }


  // ===== Titel-Prognose (rechts oben): schlanke Monte-Carlo aus den Elo-Werten,
  //       bedingt auf die echten bisherigen Ergebnisse. Gleiches Modell wie im
  //       Simulator (Jetzt, Divisor 600, ohne Heim/Turnierfaktor). =====
  const PRED_LN10 = Math.log(10), PRED_DIV = 600, PRED_N = 50000;
  // Elo-Ratings in Bracket-Slot-Reihenfolge (muss mit den Werten im Simulator-Tab übereinstimmen)
  const PRED_ELO = [1735.77,1505.35,1870.70,1509.79,1428.38,1559.48,1753.57,1755.10,1698.35,1380.00,
    1874.71,1597.40,1671.23,1387.22,1742.24,1684.07,1765.86,1661.58,1540.87,1557.44,1687.48,1598.52,
    1828.02,1474.43,1877.27,1350.00,1579.34,1562.37,1650.06,1571.03,1767.85,1714.87];
  function predBuildFixed(){
    const fw = COUNTS.map(c=>new Array(c).fill(null));
    const dec=(r,m)=>{ const off=official[r]&&official[r][m]; const w=winner[r]&&winner[r][m];
      return off && (w===0||w===1) ? w : null; };
    for(let m=0;m<COUNTS[0];m++){ const w=dec(0,m); if(w!==null) fw[0][m]=2*m+w; }
    for(let r=1;r<5;r++) for(let m=0;m<COUNTS[r];m++){
      const a=fw[r-1][2*m], b=fw[r-1][2*m+1], w=dec(r,m);
      if(a!=null && b!=null && w!==null) fw[r][m] = w===0?a:b;
    }
    return fw;
  }
  function predTitleProb(N){
    const NT=TEAMS.length;
    const pts=new Float64Array(NT);
    for(let i=0;i<NT;i++) pts[i]=PRED_ELO[i];
    const fw=predBuildFixed();
    const tit=new Float64Array(NT);
    const cur=new Int32Array(NT), nxt=new Int32Array(NT);
    for(let s=0;s<N;s++){
      for(let i=0;i<NT;i++) cur[i]=i;
      let len=NT, r=0;
      while(len>1){
        const half=len>>1, fwr=fw[r];
        for(let m=0;m<half;m++){
          const fx=fwr?fwr[m]:null;
          if(fx!=null){ nxt[m]=fx; }
          else{
            const a=cur[2*m], b=cur[2*m+1];
            const ea=1/(1+Math.exp(PRED_LN10*(pts[b]-pts[a])/PRED_DIV));
            nxt[m]=Math.random()<ea?a:b;
          }
        }
        for(let m=0;m<half;m++) cur[m]=nxt[m];
        len=half; r++;
      }
      tit[cur[0]]++;
    }
    const out=[];
    for(let i=0;i<NT;i++) out.push({i, tit:tit[i]/N*100});
    out.sort((a,b)=>b.tit-a.tit);
    return out;
  }
  function renderPred(){
    const el=document.getElementById('pred');
    if(!el) return;
    const ranked=predTitleProb(PRED_N).filter(t=>t.tit>0).slice(0,4);
    if(!ranked.length){ el.className='pred empty'; el.textContent='Titel-Prognose …'; return; }
    const fmt=v=> (v>=10 ? v.toFixed(1) : v.toFixed(1)).replace('.',',')+'%';
    el.className='pred';
    el.innerHTML='<div class="pt">Titel-Prognose</div>' + ranked.map(t=>{
      const tm=TEAMS[t.i];
      return `<div class="pr"><span class="pfl">${tm.f}</span>`
           + `<span class="pnm">${tm.n}</span><span class="ppc">${fmt(t.tit)}</span></div>`;
    }).join('');
  }
  // nur neu rechnen, wenn sich der echte Bracket-Stand geändert hat (Simulation ~ teuer)
  let lastPredSig = null;
  function maybePred(){
    const sig = JSON.stringify(winner) + '|' + JSON.stringify(official);
    if(sig===lastPredSig) return;
    lastPredSig = sig;
    renderPred();
  }

  function render(){
    dayMap = buildDayMap();
    let html="";
    for(let r=0;r<COUNTS.length;r++){
      let inner=`<div class="rlabel">${LABELS[r]}</div>`;
      if(r===4){
        // Finale + Spiel um Platz 3 zusammen (Platz-3 schwebt absolut unter dem Finale)
        inner+=`<div class="finwrap">${matchHTML(4,0)}${thirdMatchHTML()}</div>`;
      } else {
        for(let p=0;p<COUNTS[r];p++) inner+=matchHTML(r,p);
      }
      html+=`<div class="round r${r}">${inner}</div>`;
    }

    // ---- Letzte Spalte: Pokal + Endstand (Top 4) ----
    const champ = winner[4][0]===null ? null : slotTeam(4,0,winner[4][0]);
    const vize  = loserTeam(4,0);                       // Finalverlierer = Platz 2
    const lA=loserTeam(3,0), lB=loserTeam(3,1);         // Halbfinal-Verlierer
    let r3=null, r4=null;
    if(third!==null){ r3 = third===0?lA:lB; r4 = third===0?lB:lA; }
    const rankRow=(pos,t,gold)=>{
      const body = t
        ? `<span class="rflag">${t.f}</span><span class="rnm">${t.n}</span>`
        : `<span class="rflag">·</span><span class="rnm ph">—</span>`;
      return `<div class="rank${gold?' gold':''}"><span class="rpos">${pos}</span>${body}</div>`;
    };
    html+=`<div class="round champ"><div class="rlabel">Weltmeister</div>`
        + `<div class="champ-box"><div class="cup">🏆</div>`
        + `<div class="finish"><div class="ttl">Endstand</div>`
        + rankRow(1, champ, true)
        + rankRow(2, vize, false)
        + rankRow(3, r3, false)
        + rankRow(4, r4, false)
        + `</div></div></div>`;

    bracket.innerHTML = `<svg class="lines" id="lines"></svg>` + html;
    thirdEl.innerHTML = "";   // separater Platz-3-Block wird nicht mehr genutzt

    saveState();
    requestAnimationFrame(drawLines);
    requestAnimationFrame(maybePred);
  }

  // Neu zeichnen, aber Fokus + Cursor im aktiven Eingabefeld erhalten
  function renderKeepFocus(){
    const ae=document.activeElement;
    const fid=(ae && ae.dataset)?ae.dataset.fid:null;
    let ss=null;
    if(fid){ try{ ss=ae.selectionStart; }catch(_){ ss=null; } }
    render();
    if(fid){
      const el=document.querySelector('[data-fid="'+fid+'"]');
      if(el){ el.focus(); try{ if(ss!=null) el.setSelectionRange(ss,ss); }catch(_){} }
    }
  }

  // Endstand-Box bündig zu Finale (oben) und Spiel um Platz 3 (unten) ausrichten
  function alignFinish(){
    const finMatch = bracket.querySelector('.finwrap > .match');
    const p3       = bracket.querySelector('.match3');
    const champCol = bracket.querySelector('.round.champ');
    const champBox = bracket.querySelector('.champ-box');
    const finish   = bracket.querySelector('.finish');
    if(!finMatch || !p3 || !champCol || !champBox || !finish) return;
    const z = zoom || 1;
    const colTop = champCol.getBoundingClientRect().top;
    const ft = finMatch.getBoundingClientRect().top;    // Finale-Oberkante
    const pb = p3.getBoundingClientRect().bottom;        // Platz-3-Unterkante
    champBox.style.top    = ((ft - colTop) / z) + 'px';
    finish.style.height   = ((pb - ft) / z) + 'px';
  }

  function drawLines(){
    const svg=bracket.querySelector("svg.lines");
    if(!svg) return;
    alignFinish();
    const z=zoom||1;
    const base=bracket.getBoundingClientRect();
    const W=bracket.offsetWidth, H=bracket.offsetHeight;
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
    svg.setAttribute("width",W); svg.setAttribute("height",H);
    let paths="";
    const pairRect=(r,p)=>{
      const el=bracket.querySelector(`.match[data-mr="${r}"][data-mp="${p}"] .pair`);
      if(!el) return null;
      const b=el.getBoundingClientRect();
      return {l:(b.left-base.left)/z, r:(b.right-base.left)/z, t:(b.top-base.top)/z, h:b.height/z};
    };
    const matchLeft=(r,p)=>{
      const el=bracket.querySelector(`.match[data-mr="${r}"][data-mp="${p}"]`);
      return el ? (el.getBoundingClientRect().left-base.left)/z : null;
    };
    // Linie: rechte Kante der Quell-Paarung -> Anfang des Ziel-Spiels (vor dem Datum)
    for(let r=1;r<COUNTS.length;r++){
      for(let p=0;p<COUNTS[r];p++){
        const dst=pairRect(r,p); if(!dst) continue;
        const dxL=matchLeft(r,p); if(dxL===null) continue;
        const dy=dst.t+dst.h/2, dx=dxL;
        for(let side=0;side<2;side++){
          const src=pairRect(r-1,p*2+side); if(!src) continue;
          const sx=src.r, sy=src.t+src.h/2;
          const mx=(sx+dx)/2;
          const col = (winner[r-1][p*2+side]!==null) ? "var(--line-win)" : "var(--line)";
          paths+=`<path d="M${sx} ${sy} H${mx} V${dy} H${dx}" fill="none" stroke="${col}" stroke-width="1.6"/>`;
        }
      }
    }
    svg.innerHTML=paths;
  }

  // ---- Eingaben: Datum / Uhrzeit / Ergebnis ----
  function readFid(el){
    const fid=(el && el.dataset)?el.dataset.fid:null; if(!fid) return null;
    const a=fid.split("-");
    return {fid, kind:a[0], r:+a[1], p:+a[2], side:+a[3]};
  }
  // K.o.-Runde ist reine Anzeige – Spielstände und Sieger kommen automatisch
  // aus dem Live-Abgleich (worldcup26.ir). Keine manuelle Eingabe mehr.

  // ---- Zoom (Schieberegler) ----
  const zoomer=document.getElementById("zoomer");
  const zrange=document.getElementById("zrange");
  function applyZoom(){
    bracket.style.transform = zoom===1 ? "none" : `scale(${zoom})`;
    const w=bracket.offsetWidth, h=bracket.offsetHeight;
    zoomer.style.width  = (w*zoom)+"px";
    zoomer.style.height = (h*zoom)+"px";
    const pct = (zoom*100 - 40) / (160 - 40) * 100;   // Reglerfüllung
    zrange.style.setProperty("--fill", pct.toFixed(1)+"%");
    requestAnimationFrame(drawLines);
  }
  function setZoom(z){
    zoom = Math.min(1.6, Math.max(0.4, Math.round(z*100)/100));
    if(+zrange.value !== Math.round(zoom*100)) zrange.value = Math.round(zoom*100);
    applyZoom();
  }
  zrange.addEventListener("input",()=>setZoom(+zrange.value/100));
  document.getElementById("zoomIn").addEventListener("click",()=>setZoom(zoom+0.1));
  document.getElementById("zoomOut").addEventListener("click",()=>setZoom(zoom-0.1));

  // ===== Automatischer Ergebnis-Abgleich mit der offiziellen Datenquelle =====
  // Datenquelle: worldcup26.ir (kostenlos, ohne Schlüssel, CORS offen).
  // Läuft auf echter Domain (GitHub Pages / Homescreen). Im Claude-Vorschau-Sheet
  // scheitern externe Abrufe – dann bleibt einfach der gespeicherte/manuelle Stand.
  let flashFids = [];
  const API_URL = "https://worldcup26.ir/get/games";
  const TYPE_BY_ROUND = ["r32","r16","qf","sf","final"]; // Bracket-Runden 0..4

  function applyLiveGames(games){
    const byType = {};
    for(const g of games){
      const t = g && g.type; if(!t) continue;
      (byType[t] = byType[t] || []).push(g);
    }
    const num = v => { const n = parseInt(v,10); return isNaN(n) ? null : n; };
    const isFin = g => String(g.finished).toUpperCase() === "TRUE";
    const find = (list, idA, idB) => list && list.find(g => {
      const h = num(g.home_team_id), a = num(g.away_team_id);
      return (h===idA && a===idB) || (h===idB && a===idA);
    });
    // Trägt API-Tore seitenrichtig ein; gibt true zurück, wenn etwas geändert wurde
    function put(g, teamTop, fidBase, setScore, getScore, setWin, curWin){
      const h = num(g.home_team_id);
      let so, su;
      if(h===teamTop.id){ so=num(g.home_score); su=num(g.away_score); }
      else              { so=num(g.away_score); su=num(g.home_score); }
      if(so===null || su===null) return false;
      let ch=false;
      const cur=getScore();
      const pO=parseInt(cur[0],10), pU=parseInt(cur[1],10);
      if(cur[0]!==String(so)){ flashFids.push({fid:fidBase+"-0", down:!isNaN(pO)&&so<pO}); ch=true; }
      if(cur[1]!==String(su)){ flashFids.push({fid:fidBase+"-1", down:!isNaN(pU)&&su<pU}); ch=true; }
      if(ch) setScore([String(so),String(su)]);
      if(isFin(g)){                                   // Sieger + Sperre erst bei Abpfiff
        const w = scoreWinner(String(so), String(su));
        if(w!==null && curWin()!==w){ setWin(w); ch=true; }
      }
      return ch;
    }
    let changed=false;
    for(let r=0;r<5;r++){
      const list = byType[TYPE_BY_ROUND[r]];
      for(let p=0;p<COUNTS[r];p++){
        const tA=slotTeam(r,p,0), tB=slotTeam(r,p,1);
        if(!tA||!tB) continue;
        const g=find(list, tA.id, tB.id); if(!g) continue;
        const prevTe=telapsed[r][p];
        telapsed[r][p]=String(g.time_elapsed||"");
        if(prevTe!==telapsed[r][p]) changed=true;     // Statuswechsel (z.B. Anpfiff) -> neu zeichnen
        if(isFin(g) && !official[r][p]){ official[r][p]=true; changed=true; }
        const stt=matchStatus(official[r][p], dts[r][p][0], dts[r][p][1], telapsed[r][p]);
        if(stt!=='live' && stt!=='done') continue;   // vor Anpfiff: keine Tore eintragen
        if(put(g, tA, `s-${r}-${p}`,
              v=>{scores[r][p]=v;}, ()=>scores[r][p],
              w=>{winner[r][p]=w; invalidateAfter(r,p);}, ()=>winner[r][p])) changed=true;
      }
    }
    // Spiel um Platz 3
    const lA=loserTeam(3,0), lB=loserTeam(3,1);
    if(lA&&lB){
      const g=find(byType["third"], lA.id, lB.id);
      if(g){
        const prevTe3=telapsed3;
        telapsed3=String(g.time_elapsed||"");
        if(prevTe3!==telapsed3) changed=true;
        if(isFin(g) && !official3){ official3=true; changed=true; }
        const st3=matchStatus(official3, dt3[0], dt3[1], telapsed3);
        if(st3==='live' || st3==='done'){
          if(put(g, lA, "s3", v=>{score3=v;}, ()=>score3, w=>{third=w;}, ()=>third)) changed=true;
        }
      }
    }
    if(resolvePenalties()) changed=true;   // beendete Unentschieden über Vergleichsquelle auflösen
    return changed;
  }

  function flashChanged(){
    for(const f of flashFids){
      const el=document.querySelector(`.score[data-fid="${f.fid}"]`);
      if(el){ el.classList.remove("flash","flashdown"); void el.offsetWidth;
              el.classList.add(f.down ? "flashdown" : "flash"); }
    }
    flashFids.length = 0;
  }
  // ---- Vergleichsquelle (openfootball, public domain, CORS) für Elfmeter-/Verlängerungs-Ausgang ----
  const OF_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
  let ofMatches = null;
  function ofLoad(){
    fetch(OF_URL, {cache:"no-store"}).then(r=>r.json()).then(d=>{
      if(d && Array.isArray(d.matches)){
        ofMatches = d.matches;
        if(resolvePenalties()){ saveState(); }   // sofort auf dem gespeicherten Stand auflösen
        render();
      }
    }).catch(()=>{ /* Vergleichsquelle offline -> Primärquelle bleibt maßgeblich */ });
  }
  // Liefert {win:0|1, label} für ein beendetes Unentschieden (Sieger aus Elfmeter > Verlängerung > regulär), sonst null
  function ofResolve(idTop, idBot){
    if(!ofMatches) return null;
    const nT=EN_NAME[idTop], nB=EN_NAME[idBot];
    if(!nT||!nB) return null;
    const m=ofMatches.find(x=>(x.team1===nT&&x.team2===nB)||(x.team1===nB&&x.team2===nT));
    if(!m||!m.score) return null;
    const flip=(m.team1===nB);   // openfootball-Reihenfolge ggf. vertauscht -> auf oben/unten drehen
    const pick=arr=>{ if(!Array.isArray(arr)||arr.length<2) return null;
                      const a=+arr[0], b=+arr[1]; if(Number.isNaN(a)||Number.isNaN(b)) return null;
                      return flip?[b,a]:[a,b]; };
    const ft=pick(m.score.ft), et=pick(m.score.et), pen=pick(m.score.p);
    const stages=[];
    if(ft)  stages.push({sc:ft,  lbl:""});       // reguläre Spielzeit
    if(et)  stages.push({sc:et,  lbl:"n.V."});   // nach Verlängerung
    if(pen) stages.push({sc:pen, lbl:"i.E."});   // im Elfmeterschießen
    if(!stages.length) return null;
    const last=stages[stages.length-1].sc;
    if(last[0]===last[1]) return null;           // auch letzte Stufe unentschieden -> kein Sieger
    return {win:last[0]>last[1]?0:1, stages:stages};
  }
  // Geht den gespeicherten Stand durch und löst jedes beendete Tor-Unentschieden über die Vergleichsquelle auf.
  // Läuft unabhängig vom Live-Sync -> Label kommt, sobald openfootball geladen ist, egal was die Primärquelle liefert.
  function resolvePenalties(){
    if(!ofMatches) return false;
    let ch=false;
    const tie=(a,b)=> a!=="" && b!=="" && (+a)===(+b);
    const sig=st=> st ? st.map(s=>s.sc.join(":")+s.lbl).join("|") : "";   // Phasen-Vergleich über String
    for(let r=0;r<COUNTS.length;r++){
      for(let p=0;p<COUNTS[r];p++){
        if(!tie(scores[r][p][0], scores[r][p][1])) continue;
        const tA=slotTeam(r,p,0), tB=slotTeam(r,p,1); if(!tA||!tB) continue;
        const res=ofResolve(tA.id, tB.id); if(!res) continue;
        if(winner[r][p]!==res.win){ winner[r][p]=res.win; invalidateAfter(r,p); ch=true; }
        if(sig(koStages[r][p])!==sig(res.stages)){ koStages[r][p]=res.stages; ch=true; }
      }
    }
    if(tie(score3[0], score3[1])){
      const lA=loserTeam(3,0), lB=loserTeam(3,1);
      if(lA&&lB){ const res=ofResolve(lA.id, lB.id);
        if(res){ if(third!==res.win){ third=res.win; ch=true; }
                 if(sig(koStages3)!==sig(res.stages)){ koStages3=res.stages; ch=true; } } }
    }
    return ch;
  }
  function fetchLive(){
    flashFids.length = 0;
    const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), 9000));
    Promise.race([ fetch(API_URL, {cache:"no-store"}).then(r=>r.json()), timeout ])
      .then(data=>{
        const games = data && data.games;
        if(!Array.isArray(games)) return;
        if(applyLiveGames(games)){ saveState(); render(); flashChanged(); }
      })
      .catch(()=>{ /* Vorschau/offline/Quelle weg -> manueller Stand bleibt erhalten */ });
  }

  window.addEventListener("resize",()=>applyZoom());
  loadState();
  render();
  applyZoom();
  fetchLive();
  ofLoad();                          // Vergleichsquelle laden (löst danach Elfmeter-/Verlängerungs-Ausgänge auf)
  setInterval(fetchLive, 30000);   // alle 30 s echten Live-Stand abgleichen
  setInterval(ofLoad, 5*60000);      // openfootball aktualisiert langsam -> alle 5 Min nachladen
  setInterval(render, 60000);      // Status-Rahmen (bald/läuft) aktuell halten
})();
[[SCRIPTEND]]

  <script type="text/html" id="srcS"><!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>WM 2026 – Monte-Carlo-Simulator</title>
<style>
  :root{
    --bg:#0f1830; --bg2:#0b1226; --card:#172441; --card2:#1d2c4e;
    --gold:#f4c64a; --blue:#6e9bf0; --blue-d:#4a6aa8;
    --txt:#e7edff; --muted:#9fb0d6; --line:#2a3a5e; --win:#f4c64a;
    --bar:#6e9bf0; --bar-top:#f4c64a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.4; padding:14px 12px 60px;
    max-width:680px; margin:0 auto;
  }
  /* feste dunkle Grundfläche (gegen iOS-Dark-Mode-Overlay) */
  #bgfix{position:fixed; inset:0; z-index:0; background:var(--bg);}
  .app{position:relative; z-index:1;}

  header{text-align:center; margin-bottom:9px;}
  header h1{font-size:19px; font-weight:800; margin:0; letter-spacing:.3px;}
  header .sub{font-size:12px; color:var(--muted); margin-top:3px;}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:10px 13px; margin-bottom:10px;}
  .grp{padding:6px 0; border-bottom:1px solid var(--line);}
  .grp:first-child{padding-top:2px;}
  .grp:last-child{border-bottom:0; padding-bottom:2px;}
  .grp-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .grp-label{font-size:13px; font-weight:700; color:var(--txt);}
  .grp-val{font-size:15px; font-weight:800; color:var(--gold); font-variant-numeric:tabular-nums;}
  .hint{font-size:11px; color:var(--muted); display:flex; justify-content:space-between; margin-top:4px;}
  /* ---- Live-Modus ---- */
  .durrow{display:flex; align-items:center; gap:10px; margin:2px 2px 10px;}
  .durlbl{font-size:12px; color:var(--muted); flex:0 0 auto; display:flex; align-items:center;}
  .durval{font-size:12.5px; color:var(--txt); font-weight:800; min-width:46px; text-align:right; flex:0 0 auto;
    font-variant-numeric:tabular-nums;}
  .liverow{display:flex; justify-content:space-between; align-items:baseline; margin:0 3px 8px; min-height:22px;}
  .liveround{font-size:13px; font-weight:800; color:var(--gold); letter-spacing:.02em;}
  .liveclock{font-size:19px; font-weight:800; color:var(--txt); font-variant-numeric:tabular-nums;}
  .conf{display:flex; flex-direction:column; gap:3px; padding-bottom:6px;}
  .cmatch{display:flex; align-items:center; gap:6px; padding:3px 9px;
    border:1px solid var(--line); border-radius:8px; background:var(--card); font-size:11px; transition:opacity .3s;}
  .cmatch.live{border-color:rgba(244,198,74,.4);}
  .cmatch.done{opacity:.58;}
  .cteam{flex:1 1 0; display:flex; align-items:center; gap:5px; min-width:0; padding:2px 6px; border-radius:6px;
    transition:background .25s;}
  .cteam.away{flex-direction:row-reverse; text-align:right;}
  .cteam.lead{background:rgba(120,165,250,.22);}
  .cteam .cf{font-size:13.5px; flex:0 0 auto;}
  .cteam .cn{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--muted);}
  .cteam.win .cn{font-weight:800; color:var(--txt);}
  .cteam.lose .cn{color:var(--muted);}
  .cscore{flex:0 0 auto; min-width:46px; text-align:center; font-weight:800; font-size:12.5px;
    font-variant-numeric:tabular-nums; color:var(--txt); padding:2px 4px; border-radius:6px;}
  .cscore.flash{animation:scflash .75s ease;}
  @keyframes scflash{0%,40%{background:var(--gold); color:#1a1305;} 100%{background:transparent; color:var(--txt);}}
  /* Turnierfaktor */
  .spec{font-size:9px; font-weight:700; color:#1a1305; background:var(--gold);
    padding:1px 6px; border-radius:7px; letter-spacing:.03em; margin-left:5px; vertical-align:1px;}
  .tfwarn{display:none; font-size:11px; color:var(--muted); margin-top:9px; line-height:1.5;
    background:rgba(244,198,74,.07); border:1px solid rgba(244,198,74,.22);
    border-radius:9px; padding:8px 10px;}
  .tfwarn b{color:#ffd96b;}
  .tflink{display:block; margin-top:6px; background:none; border:none; color:var(--blue);
    font-family:inherit; font-size:11px; font-weight:800; cursor:pointer; padding:2px 0; text-align:left;}
  .tfinfo{display:none; margin-top:10px; padding-top:11px; border-top:1px solid var(--line);}
  .tfinfo.on{display:block;}
  .tfinfo p{margin:0 0 9px; font-size:11.5px; color:var(--muted); line-height:1.55;}
  .tfinfo p b{color:var(--txt);}
  .fp-title{font-size:10.5px; font-weight:800; color:var(--gold); text-align:center;
    text-transform:uppercase; letter-spacing:.05em; margin:2px 0 6px;}
  .fpsvg{width:100%; height:auto; display:block; margin-bottom:3px;}


  /* Slider */
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:30px;
    background:transparent; cursor:pointer; margin:0; touch-action:none;}
  input[type=range]::-webkit-slider-runnable-track{height:6px; border-radius:3px;
    background:linear-gradient(90deg,var(--blue) var(--fill,50%),#243355 var(--fill,50%));}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; appearance:none;
    width:24px; height:24px; border-radius:50%; background:var(--gold);
    border:3px solid #1a2440; margin-top:-9px; box-shadow:0 2px 5px rgba(0,0,0,.4);}
  input[type=range]:disabled{opacity:.4;}
  input[type=range]:disabled::-webkit-slider-thumb{background:var(--muted);}

  /* Toggle */
  .switch{position:relative; width:50px; height:28px; flex:0 0 auto;}
  .switch input{opacity:0; width:0; height:0; position:absolute;}
  .slider-sw{position:absolute; inset:0; background:#243355; border-radius:28px; transition:.2s;}
  .slider-sw:before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s;}
  .switch input:checked + .slider-sw{background:var(--gold);}
  .switch input:checked + .slider-sw:before{transform:translateX(22px);}

  /* Lauf-Buttons + Tabs */
  .seg{display:flex; gap:6px;}
  .seg button{flex:1; padding:9px 4px; border:1px solid var(--line); background:#142036;
    color:var(--muted); border-radius:9px; font-family:inherit; font-size:13px; font-weight:700;
    cursor:pointer; transition:.12s;}
  .seg button.on{background:var(--blue); color:#0b1226; border-color:var(--blue);}

  .tabs{display:flex; gap:8px; margin-bottom:10px;}
  .tabs button{flex:1; padding:11px 5px; border:1px solid var(--line); background:var(--card);
    color:var(--muted); border-radius:11px; font-family:inherit; font-size:12.5px; font-weight:700;
    cursor:pointer; transition:.12s;}
  .tabs button.on{background:var(--gold); color:#1a1305; border-color:var(--gold);}

  .view{display:none;}
  .view.on{display:block;}

  /* Wahrscheinlichkeits-Liste */
  .status{font-size:12px; color:var(--muted); text-align:center; padding:6px 0 11px; min-height:26px;}
  .rowlist{display:flex; flex-direction:column; gap:3px;}
  .row{background:var(--card); border:1px solid var(--line); border-radius:9px;
    padding:5px 9px; display:flex; align-items:center; gap:7px;}
  .row .flag{font-size:16px; width:21px; text-align:center; flex:0 0 auto;}
  .row .mid{flex:1 1 auto; min-width:0;}
  .row .nm{font-size:12.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row .det{font-size:9.5px; color:var(--muted); margin-top:1px; font-variant-numeric:tabular-nums;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row .barwrap{flex:0 0 78px; height:8px; background:#1a2740; border-radius:5px; overflow:hidden;}
  .row .bar{height:100%; background:var(--bar); border-radius:5px; transition:width .35s ease;}
  .row.top .bar{background:var(--bar-top);}
  .row .pct{flex:0 0 42px; text-align:right; font-size:13px; font-weight:800;
    font-variant-numeric:tabular-nums;}
  .row.top .pct{color:var(--gold);}

  /* einzeilige Tabelle, beide Modi mit Kopfzeile */
  .phead{display:flex; align-items:center; gap:4px; padding:2px 9px 4px; font-size:8px;
    border:1px solid transparent; color:var(--muted); text-transform:uppercase;
    letter-spacing:.05em; font-weight:700;}
  .prow{display:flex; align-items:center; gap:4px; padding:2px 9px; margin-bottom:2px; line-height:1.15;
    background:var(--card); border:1px solid var(--line); border-radius:7px; font-size:11px;}
  .prow.top{border-color:rgba(244,198,74,.3);}
  .phead .pf,.prow .pf{flex:0 0 17px; font-size:13px; text-align:center;}
  /* Team-Spalte: Kürzel fest schmal | Name flexibel mit Ellipsis */
  .phead .pteam,.prow .pteam{flex:0 0 100px; min-width:0; font-weight:700; color:var(--txt);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .prow.top .pteam{color:var(--gold);}
  .phead .pcol,.prow .pcol{flex:0 0 19px; text-align:right; font-variant-numeric:tabular-nums;}
  .phead .pcolf,.prow .pcolf{flex:0 0 24px; text-align:right; font-variant-numeric:tabular-nums;}
  .phead .pcolf{text-align:center;}   /* "F" mittig über der breiteren Dezimalzahl */
  .prow .pcol,.prow .pcolf{color:var(--muted);}
  .phead .pwm,.prow .pwm{flex:0 0 34px; text-align:right; font-weight:800; font-size:12px;
    font-variant-numeric:tabular-nums; color:var(--txt);}
  .prow.top .pwm{color:var(--gold);}
  /* Trichter-Balken: in beiden Modi gleich (nimmt Restplatz) */
  .phead .pfunnel,.prow .pfunnel{flex:1 1 auto; min-width:0;}
  .prow .pfunnel{display:flex; align-items:center;}
  .fbar{display:block; width:100%; height:7px; border-radius:3px;}

  /* ----- Runden-Kästchen + bedingte Prognose (Jetzt/Start) ----- */
  /* Kopf & Daten nutzen identische Spaltenbreiten (oben definiert) -> Zahlen fluchten unter den
     Kürzeln; Name fest, Balken (pfunnel) nimmt flex:1 den Restplatz rechts. */
  .rnd{flex:0 0 20px; text-align:center; font-size:9px; font-weight:800; letter-spacing:.02em;}
  .rnd.active{color:var(--gold);} .rnd.gone{color:#d97a6e;}
  .boxes{flex:0 0 auto; display:flex; gap:2px; margin-right:1px;}
  .boxes i{width:7px; height:7px; border-radius:2px; border:1px solid var(--line); background:transparent; display:block;}
  .boxes i.done{background:#5d7fc0; border-color:#5d7fc0;}
  .boxes i.now{background:var(--gold); border-color:var(--gold);}
  .boxes i.out{background:#d97a6e; border-color:#d97a6e;}
  /* Runden-Zahlen-Spalten AF/VF/HF/F (Layout 1) */
  .phead .col,.prow .col{flex:0 0 20px; text-align:right; font-size:10.5px;
    font-variant-numeric:tabular-nums; color:var(--txt);}
  .phead .col{color:var(--muted); font-weight:700;}
  .prow .col.done{color:#5a6b92; font-weight:600;}   /* erledigte Runde = 100, dezent */
  .prow .col.next{color:var(--gold); font-weight:900;}/* nächste Hürde = fett gold */
  .prow .col.gone{color:#5a6b92; font-weight:600;}    /* ausgeschieden: – */
  .prow.dead{opacity:.6;}
  .prow.dead .pteam{text-decoration:line-through; color:#7d8aad;}
  .prow.dead .pf{filter:grayscale(.85);}
  .prow.dead .pwm{color:#7d8aad;}
  .pdiv{display:flex; align-items:center; gap:8px; margin:6px 2px 4px; color:#7d8aad;
    font-size:8.5px; font-weight:800; letter-spacing:.8px; text-transform:uppercase;}
  .pdiv::before,.pdiv::after{content:""; flex:1; height:1px; background:var(--line);}
  .probseg{display:flex; align-items:stretch; gap:6px; margin-bottom:8px;}
  .probseg .seg{flex:1; margin:0;}
  .probseg .segi{flex:0 0 38px; width:38px; height:auto; border-radius:11px; font-size:14px;
    color:var(--muted); border:1px solid var(--line);}
  /* Farbpunkte im Info-Fenster */
  .ibox{display:inline-block; width:10px; height:10px; border-radius:2px; vertical-align:-1px;
    border:1px solid var(--line);}
  .ibox.bd{background:#5d7fc0; border-color:#5d7fc0;} .ibox.bn{background:var(--gold); border-color:var(--gold);}
  .ibox.bo{background:#d97a6e; border-color:#d97a6e;} .ibox.be{background:transparent;}

  /* Einzel-Turnier */
  .rollbtn{width:100%; padding:13px; border:none; border-radius:12px; background:var(--gold);
    color:#1a1305; font-family:inherit; font-size:15px; font-weight:800; cursor:pointer;
    margin-bottom:13px; box-shadow:0 3px 10px rgba(244,198,74,.25);}
  .rollbtn:active{transform:translateY(1px);}
  /* Aktionszeile: Würfel-Button + Namensumschalter (höhenneutral) */
  .actionrow{scroll-margin-top:8px; display:flex; gap:8px; align-items:stretch; margin-bottom:10px;}
  .actionrow .rollbtn{flex:1 1 auto; margin-bottom:0;}
  .nmtog{flex:0 0 auto; display:flex; border:1px solid var(--line); border-radius:12px;
    overflow:hidden; background:#142036;}
  .nmtog button{border:none; background:transparent; color:var(--muted);
    font-family:inherit; font-size:12.5px; font-weight:700; padding:0 12px; cursor:pointer;
    white-space:nowrap; transition:.12s;}
  .nmtog button + button{border-left:1px solid var(--line);}
  .nmtog button.on{background:var(--gold); color:#1a1305;}
  /* Turnierbaum */
  .treewrap{overflow:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--line);
    border-radius:12px; background:var(--bg2); padding:7px; margin-bottom:9px;}
  .treezoom{position:relative;}
  .tree{position:relative; display:flex; align-items:stretch; gap:6px; width:max-content;
    padding-top:15px; transform-origin:top left;}
  svg.tlines{position:absolute; top:0; left:0; pointer-events:none; z-index:0; overflow:visible;}
  .tcol{position:relative; z-index:1; display:flex; flex-direction:column;
    justify-content:space-around; flex:0 0 auto; width:var(--colw,64px);}
  .tcol.c0{gap:2px;}
  .tcol.finalcol{justify-content:center;}
  .finalwrap{display:flex; flex-direction:column; gap:16px; align-items:stretch;}
  .tlabel{position:absolute; top:-14px; left:0; right:0; text-align:center; font-size:8.5px;
    letter-spacing:.02em; text-transform:uppercase; font-weight:800; color:var(--gold); white-space:nowrap;}
  .mbox{border:1px solid var(--line); border-radius:5px; overflow:hidden; background:var(--card);}
  .tslot{display:flex; align-items:center; gap:1px; height:16px; padding:0 3px; font-size:9px;
    border-bottom:1px solid var(--line); line-height:1;}
  .tslot:last-child{border-bottom:0;}
  .tslot .tf{font-size:10px; flex:0 0 auto; width:12px; text-align:center;}
  .tslot .tn{flex:1 1 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600;}
  .tree.codemode .tslot .tn{flex:0 0 22px; font-size:9px;}     /* breite Spalte, MAR/SWE voll lesbar */
  .tslot .tg{flex:0 0 6px; font-size:9px; font-weight:800; font-variant-numeric:tabular-nums;
    text-align:right; color:var(--muted);}
  /* Sieger: helle Schrift + goldener Marker; Verlierer: leicht gedämpft; keine Flächenfarbe */
  .tslot.win .tn{color:#eef2f8;}
  .tslot.win .tg{color:#eef2f8;}
  .tslot.lose .tn{color:#97a3b6;}
  .tslot.lose .tg{color:#97a3b6;}
  .tslot.lose .tf{opacity:.72;}
  .tslot .tm{flex:0 0 11px; line-height:1; font-weight:800; color:var(--gold);}
  .tslot .tm.tmo{font-size:5.5px; align-self:flex-start; margin-top:.5px; text-align:left;
    letter-spacing:-.2px; padding-left:1px;}
  .tslot .tm.tmw{font-size:9px; align-self:center; text-align:center;}
  .champbox{border:1.5px solid var(--gold); border-radius:8px; padding:5px 4px; text-align:center;
    background:linear-gradient(180deg,rgba(244,198,74,.2),rgba(244,198,74,.04));}
  .champbox .cuptag{font-size:7px; letter-spacing:.1em; text-transform:uppercase; font-weight:800;
    color:var(--gold); margin-bottom:1px; opacity:.85;}
  .champbox .cup2{font-size:18px; line-height:1; filter:drop-shadow(0 3px 8px rgba(244,198,74,.4));}
  .champbox .cn{margin-top:2px; font-size:9.5px; font-weight:800; color:#fff5dc;
    display:flex; align-items:center; justify-content:center; gap:3px; flex-wrap:wrap; line-height:1.1;}
  .champbox .cn .cf{font-size:12px;}

  /* Zoom-Leiste */
  .zoomrow{display:flex; align-items:center; gap:10px; margin-bottom:13px;}
  .zb{width:40px; height:34px; flex:0 0 auto; border:1px solid var(--line); background:var(--card);
    color:var(--txt); border-radius:9px; font-size:20px; font-weight:700; cursor:pointer;}
  .zb:active{background:var(--card2);}
  .zr{flex:1 1 auto;}

  /* Endstand */
  #liveFinish{margin-top:12px;}
  .finish{border:1.5px solid var(--gold); border-radius:13px; overflow:hidden; margin-top:6px;
    background:linear-gradient(180deg,rgba(244,198,74,.14),rgba(244,198,74,.03));}
  .cup{text-align:center; font-size:40px; line-height:1; margin:4px 0 -2px;
    filter:drop-shadow(0 4px 10px rgba(244,198,74,.35));}
  .finish .ft{font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold);
    font-weight:800; text-align:center; padding:9px 0 8px; border-bottom:1px solid rgba(244,198,74,.25);}
  .frow{display:flex; align-items:center; gap:9px; padding:10px 13px; font-size:14.5px;
    border-bottom:1px solid rgba(244,198,74,.12);}
  .frow:last-child{border-bottom:0;}
  .frow .fp{width:17px; flex:0 0 auto; text-align:center; font-weight:800; font-size:13px; color:var(--muted);}
  .frow .ff{font-size:18px; flex:0 0 auto;}
  .frow .fn{font-weight:700;}
  .frow.gold{background:rgba(244,198,74,.13);}
  .frow.gold .fp{color:var(--gold);} .frow.gold .fn{font-weight:800; color:#fff5dc;}

  @media (prefers-reduced-motion:reduce){
    .row .bar{transition:none;}
  }
  /* Info-Button + Modal */
  .ibtn{display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px;
    border-radius:50%; border:1px solid var(--muted); background:none; color:var(--muted);
    font-size:10px; font-weight:700; font-style:italic; font-family:Georgia,"Times New Roman",serif;
    cursor:pointer; margin-left:6px; vertical-align:middle; padding:0; line-height:1; flex:0 0 auto;}
  .ibtn:active{background:var(--muted); color:#0a1330;}
  .ibtn.tabinfo{margin-left:0; flex:0 0 38px; width:38px; height:auto; border-radius:11px; font-size:14px; align-self:stretch; border-color:var(--line); color:var(--muted);}
  .ctrl{display:flex; align-items:center; gap:9px;}
  .grp-val.sm{font-size:13px;}
  .imodal{position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    background:rgba(5,10,22,.74); padding:18px;}
  .imodal.on{display:flex;}
  .imodal-card{background:#0f1c34; border:1px solid var(--line); border-radius:16px;
    max-width:340px; width:100%; max-height:82vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    box-shadow:0 18px 50px rgba(0,0,0,.55);}
  .imodal-head{display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px 8px; position:sticky; top:0; background:#0f1c34;}
  .imodal-title{font-size:16px; font-weight:800; color:var(--gold);}
  .imodal-x{background:rgba(255,255,255,.08); border:0; color:var(--txt); width:30px; height:30px;

  .imodal-body{padding:2px 16px 18px; font-size:12.5px; line-height:1.6; color:var(--muted);}
  .imodal-body p{margin:0 0 11px;}
  .imodal-body b{color:var(--txt);}
  .imodal-body .iwarn{background:rgba(244,198,74,.08); border:1px solid rgba(244,198,74,.25);
    border-radius:9px; padding:9px 11px; margin-bottom:12px; font-size:11.5px;}
  .imodal-body .iwarn b{color:#ffd96b;}

<body>
<div id="bgfix"></div>
<div class="app">
  <header>
    <h1>WM 2026 · Monte-Carlo</h1>
    <div class="sub">FIFA-Elo-Simulation der K.-o.-Runde</div>
  </header>

  <div class="panel">
    <div class="grp">
      <div class="grp-head">
        <span class="grp-label">Divisor<button class="ibtn" data-info="div">i</button></span>
        <span class="grp-val" id="divVal">600</span>
      </div>
      <input type="range" id="divSld" min="300" max="800" step="20" value="600">
    </div>

    <div class="grp">
      <div class="grp-head">
        <span class="grp-label">Heimvorteil<button class="ibtn" data-info="home">i</button></span>
        <span class="ctrl"><span class="grp-val sm" id="homeHint">aus</span><label class="switch"><input type="checkbox" id="homeTog"><span class="slider-sw"></span></label></span>
      </div>
      <input type="range" id="homeSld" min="0" max="150" step="5" value="75" disabled>
    </div>

    <div class="grp">
      <div class="grp-head">
        <span class="grp-label">Turnierfaktor<span class="spec">spekulativ</span><button class="ibtn" data-info="tf">i</button></span>
        <label class="switch"><input type="checkbox" id="tfTog"><span class="slider-sw"></span></label>
      </div>
    </div>

  </div>

  <div class="tabs">
    <button id="tabProb" class="on">Titelchancen</button>
    <button id="tabSingle">Ein Turnier</button>
    <button id="tabLive">▶ Live</button>
    <button class="ibtn tabinfo" data-info="tabs">i</button>
  </div>

  <div class="view on" id="viewProb">
    <div class="actionrow">
      <button class="rollbtn" id="simBtn">🎲 100.000 Turniere simulieren</button>
      <div class="nmtog" role="group" aria-label="Namensanzeige">
        <button type="button" data-mode="code">Kürzel</button>
        <button type="button" data-mode="full" class="on">Name</button>
      </div>
    </div>
    <div class="probseg">
      <div class="seg">
        <button id="segNow" class="on" type="button">⚡ Jetzt</button>
        <button id="segStart" type="button">🏁 Start</button>
      </div>
      <button class="ibtn segi" data-info="boxes">i</button>
    </div>
    <div class="status" id="probStatus"></div>
    <div class="rowlist" id="probList"></div>
  </div>

  <div class="view" id="viewSingle">
    <div class="actionrow">
      <button class="rollbtn" id="rollBtn">🎲 Turnier auswürfeln</button>
      <div class="nmtog" role="group" aria-label="Namensanzeige">
        <button type="button" data-mode="code" class="on">Kürzel</button>
        <button type="button" data-mode="full">Name</button>
      </div>
    </div>
    <div class="treewrap" id="treeWrap">
      <div class="treezoom" id="treeZoom">
        <div class="tree" id="tree"></div>
      </div>
    </div>
    <div class="zoomrow">
      <button class="zb" id="tzOut" aria-label="kleiner">−</button>
      <input type="range" class="zr" id="tzSld" min="60" max="220" step="10" value="100" aria-label="Zoom">
      <button class="zb" id="tzIn" aria-label="größer">+</button>
    </div>
    <div id="singleFinish"></div>
  </div>

  <div class="view" id="viewLive">
    <div class="actionrow">
      <button class="rollbtn" id="liveBtn">▶ Anpfiff</button>
      <div class="nmtog" role="group" aria-label="Namensanzeige">
        <button type="button" data-lmode="code" class="on">Kürzel</button>
        <button type="button" data-lmode="full">Name</button>
      </div>
    </div>
    <div class="durrow">
      <span class="durlbl">Spieldauer<button class="ibtn" data-info="live">i</button></span>
      <input type="range" class="zr" id="liveDur" min="10" max="120" step="5" value="30">
      <span class="durval" id="liveDurVal">30 s</span>
    </div>
    <div class="liverow">
      <span class="liveround" id="liveRound">Bereit zum Anpfiff</span>
      <span class="liveclock" id="liveClock"></span>
    </div>
    <div class="conf" id="conf"></div>
    <div id="liveFinish"></div>
  </div>
</div>

<div class="imodal" id="imodal">
  <div class="imodal-card">
    <div class="imodal-head"><span class="imodal-title" id="imodalTitle"></span><button class="imodal-x" id="imodalX">✕</button></div>
    <div class="imodal-body" id="imodalBody"></div>
  </div>
</div>
