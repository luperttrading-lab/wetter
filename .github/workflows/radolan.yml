name: RADOLAN Tagesregen

on:
  schedule:
    - cron: "35 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  radolan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: numpy installieren
        run: pip install --quiet numpy
      - name: RADOLAN holen und radolan.json schreiben
        run: python radolan_regen.py
      - name: radolan.json committen (nur bei Aenderung)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radolan.json
          git diff --staged --quiet || git commit -m "RADOLAN Tagesregen aktualisiert"
          git push
